<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receiptly • Camera Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    video, canvas { width: 100%; max-height: 400px; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-xl mx-auto p-4">
    <h1 class="text-3xl font-bold text-center mb-8">Receiptly</h1>

    <div id="camera-view" class="bg-zinc-900 rounded-3xl p-4 mb-6">
      <video id="video" autoplay playsinline class="rounded-2xl"></video>
      <button onclick="capturePhoto()" class="mt-4 w-full bg-emerald-500 py-4 rounded-3xl font-semibold">📸 Capture Receipt</button>
    </div>

    <div id="preview" class="hidden">
      <img id="captured" class="rounded-3xl mb-4">
      <div class="flex gap-3">
        <button onclick="retake()" class="flex-1 py-4 bg-zinc-800 rounded-3xl">Retake</button>
        <button onclick="processImage()" class="flex-1 py-4 bg-emerald-500 rounded-3xl">Process with OCR</button>
      </div>
    </div>

    <!-- Results Form -->
    <div id="result-form" class="hidden space-y-6 mt-8">
      <div>
        <label>Date</label>
        <input id="date" type="date" class="w-full bg-zinc-800 p-4 rounded-2xl">
      </div>
      <div>
        <label>Merchant</label>
        <input id="merchant" class="w-full bg-zinc-800 p-4 rounded-2xl">
      </div>
      <div>
        <label>Amount (HKD)</label>
        <input id="amount" type="number" step="0.01" class="w-full bg-zinc-800 p-4 rounded-2xl text-2xl">
      </div>
      <button onclick="saveExpense()" class="w-full bg-emerald-500 py-5 rounded-3xl text-lg font-semibold">Save Expense</button>
    </div>
  </div>

  <script>
    let stream, canvas, video, capturedDataUrl;

    async function startCamera() {
      video = document.getElementById('video');
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
      } catch (err) {
        alert("Camera access denied. Please allow camera.");
      }
    }

    function capturePhoto() {
      canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      capturedDataUrl = canvas.toDataURL('image/jpeg', 0.95);

      document.getElementById('camera-view').classList.add('hidden');
      const preview = document.getElementById('preview');
      preview.classList.remove('hidden');
      document.getElementById('captured').src = capturedDataUrl;
    }

    async function processImage() {
      const loading = document.createElement('div');
      loading.textContent = "Processing receipt with Chinese OCR...";
      document.getElementById('preview').appendChild(loading);

      try {
        const worker = await Tesseract.createWorker(['eng', 'chi_tra']);
        const { data: { text } } = await worker.recognize(capturedDataUrl);
        await worker.terminate();

        console.log("OCR Text:", text);

        // Improved extraction
        const amountMatch = text.match(/總金額.*?(\d{1,3}(?:,\d{3})*(?:\.\d{2})?)/) || text.match(/(\d{1,3}(?:,\d{3})*(?:\.\d{2})?)/g);
        const dateMatch = text.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);

        document.getElementById('merchant').value = text.split('\n')[0] || "Restaurant";
        if (amountMatch) document.getElementById('amount').value = Array.isArray(amountMatch) ? amountMatch[amountMatch.length-1].replace(/,/g,'') : amountMatch[1];
        if (dateMatch) document.getElementById('date').value = `${dateMatch[1]}-${dateMatch[2].padStart(2,'0')}-${dateMatch[3].padStart(2,'0')}`;

        document.getElementById('result-form').classList.remove('hidden');
      } catch (e) {
        alert("OCR failed. Try better lighting or clearer photo.");
      } finally {
        loading.remove();
      }
    }

    function retake() {
      document.getElementById('preview').classList.add('hidden');
      document.getElementById('camera-view').classList.remove('hidden');
      document.getElementById('result-form').classList.add('hidden');
    }

    function saveExpense() {
      // Save logic here (localStorage + render)
      alert("Expense saved! (Add your full save logic here)");
    }

    window.onload = startCamera;
  </script>
</body>
</html>
