<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receiptly • Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .receipt-preview { max-height: 300px; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-xl mx-auto">
    <!-- Header -->
    <header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
      <div class="px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-xl font-bold">R</div>
          <div>
            <h1 class="text-2xl font-semibold tracking-tight">Receiptly</h1>
            <p class="text-xs text-zinc-500 -mt-1">Smart Expense Tracker</p>
          </div>
        </div>
        <div onclick="showAddModal()" 
             class="w-11 h-11 bg-emerald-600 hover:bg-emerald-500 rounded-2xl flex items-center justify-center cursor-pointer transition-all active:scale-95">
          <i class="fa-solid fa-plus text-xl"></i>
        </div>
      </div>
    </header>

    <div class="px-6 pt-6 pb-24">
      <!-- Summary Cards -->
      <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="bg-zinc-900 rounded-3xl p-5">
          <div class="text-zinc-400 text-sm">This Month</div>
          <div id="monthly-total" class="text-4xl font-semibold mt-2 text-emerald-400">$0.00</div>
        </div>
        <div class="bg-zinc-900 rounded-3xl p-5">
          <div class="text-zinc-400 text-sm">Total Expenses</div>
          <div id="total-expenses" class="text-4xl font-semibold mt-2">$0.00</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex border-b border-zinc-800 mb-6">
        <button onclick="switchTab(0)" id="tab-0"
                class="tab-btn flex-1 py-4 text-center font-medium border-b-2 border-emerald-500 text-emerald-400">History</button>
        <button onclick="switchTab(1)" id="tab-1"
                class="tab-btn flex-1 py-4 text-center font-medium text-zinc-400">Monthly</button>
      </div>

      <!-- History Tab -->
      <div id="history-tab">
        <div id="expense-list" class="space-y-3"></div>
      </div>

      <!-- Monthly Tab -->
      <div id="monthly-tab" class="hidden">
        <div id="monthly-list" class="space-y-4"></div>
      </div>
    </div>

    <!-- FAB -->
    <div onclick="showAddModal()" 
         class="fixed bottom-8 right-8 w-16 h-16 bg-emerald-500 hover:bg-emerald-600 rounded-3xl flex items-center justify-center shadow-2xl shadow-emerald-500/30 text-3xl active:scale-95 transition-all z-50">
      <i class="fa-solid fa-camera"></i>
    </div>
  </div>

  <!-- Add Expense Modal -->
  <div id="add-modal" class="hidden fixed inset-0 bg-black/80 flex items-end z-[100]">
    <div class="bg-zinc-900 w-full rounded-t-3xl max-h-[90vh] overflow-auto">
      <div class="px-6 py-6">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-semibold">New Expense</h2>
          <button onclick="hideAddModal()" class="text-zinc-400 text-2xl">✕</button>
        </div>

        <!-- Image Upload -->
        <div id="upload-area" 
             class="border-2 border-dashed border-zinc-700 hover:border-emerald-500 rounded-3xl h-64 flex flex-col items-center justify-center cursor-pointer transition-all mb-6">
          <input type="file" id="receipt-upload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
          <i class="fa-solid fa-cloud-arrow-up text-4xl mb-4 text-zinc-500"></i>
          <p class="text-zinc-400 font-medium">Upload receipt photo</p>
          <p class="text-xs text-zinc-500 mt-1">or tap to browse</p>
        </div>

        <div id="preview-area" class="hidden mb-6">
          <img id="receipt-preview" class="w-full rounded-3xl receipt-preview object-contain bg-zinc-950">
          <button onclick="removeImage()" 
                  class="text-red-400 text-sm mt-3 flex items-center gap-2">
            <i class="fa-solid fa-trash"></i> Remove Photo
          </button>
        </div>

        <!-- Form -->
        <div class="space-y-5">
          <div>
            <label class="block text-zinc-400 text-sm mb-2">Date</label>
            <input id="expense-date" type="date" 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
          </div>

          <div>
            <label class="block text-zinc-400 text-sm mb-2">Restaurant / Merchant</label>
            <input id="expense-merchant" type="text" placeholder="e.g. Sushi Express"
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
          </div>

          <div>
            <label class="block text-zinc-400 text-sm mb-2">Amount (HKD)</label>
            <div class="relative">
              <span class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400">$</span>
              <input id="expense-amount" type="number" step="0.01" placeholder="0.00"
                     class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-12 py-4 text-white text-lg font-medium">
            </div>
          </div>

          <div>
            <label class="block text-zinc-400 text-sm mb-2">Category</label>
            <select id="expense-category" 
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
              <option value="Food">🍽️ Food &amp; Drink</option>
              <option value="Transport">🚕 Transport</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Groceries">🛒 Groceries</option>
              <option value="Entertainment">🎬 Entertainment</option>
              <option value="Other">📌 Other</option>
            </select>
          </div>

          <div class="pt-4">
            <button onclick="saveExpense()" 
                    class="w-full bg-emerald-500 hover:bg-emerald-600 py-5 rounded-3xl font-semibold text-lg transition-all active:scale-95">
              Save Expense
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let expenses = JSON.parse(localStorage.getItem('receiptly_expenses')) || [];
    
    function saveToLocal() {
      localStorage.setItem('receiptly_expenses', JSON.stringify(expenses));
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderHistory() {
      const container = document.getElementById('expense-list');
      container.innerHTML = '';
      
      if (expenses.length === 0) {
        container.innerHTML = `
          <div class="text-center py-16 text-zinc-500">
            <i class="fa-solid fa-receipt text-6xl mb-4 opacity-30"></i>
            <p>No expenses yet</p>
          </div>`;
        return;
      }

      expenses.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach((exp, i) => {
        const div = document.createElement('div');
        div.className = 'bg-zinc-900 rounded-3xl p-5 flex gap-4';
        div.innerHTML = `
          <div class="w-16 h-16 bg-zinc-800 rounded-2xl flex-shrink-0 flex items-center justify-center text-3xl">
            ${getCategoryEmoji(exp.category)}
          </div>
          <div class="flex-1">
            <div class="flex justify-between">
              <div>
                <div class="font-semibold">${exp.merchant}</div>
                <div class="text-xs text-zinc-500">${formatDate(exp.date)}</div>
              </div>
              <div class="text-right">
                <div class="font-semibold text-lg">$${parseFloat(exp.amount).toFixed(2)}</div>
                <div class="text-xs text-zinc-500">${exp.category}</div>
              </div>
            </div>
            ${exp.image ? `<img src="${exp.image}" class="mt-4 w-full rounded-2xl max-h-48 object-contain">` : ''}
          </div>
        `;
        container.appendChild(div);
      });
    }

    function getCategoryEmoji(cat) {
      const emojis = {
        'Food': '🍔',
        'Transport': '🚕',
        'Shopping': '👕',
        'Groceries': '🥕',
        'Entertainment': '🎥',
        'Other': '📌'
      };
      return emojis[cat] || '📌';
    }

    function calculateMonthlyTotal() {
      const now = new Date();
      const currentMonth = now.getMonth();
      const currentYear = now.getFullYear();
      
      let total = 0;
      expenses.forEach(exp => {
        const d = new Date(exp.date);
        if (d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
          total += parseFloat(exp.amount);
        }
      });
      
      document.getElementById('monthly-total').textContent = '$' + total.toFixed(2);
      
      let allTotal = expenses.reduce((sum, exp) => sum + parseFloat(exp.amount), 0);
      document.getElementById('total-expenses').textContent = '$' + allTotal.toFixed(2);
    }

    function renderMonthly() {
      const container = document.getElementById('monthly-list');
      container.innerHTML = '';
      
      const grouped = {};
      
      expenses.forEach(exp => {
        const d = new Date(exp.date);
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}`;
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(exp);
      });
      
      Object.keys(grouped).sort().reverse().forEach(monthKey => {
        const monthExpenses = grouped[monthKey];
        const total = monthExpenses.reduce((sum, e) => sum + parseFloat(e.amount), 0);
        
        const [year, month] = monthKey.split('-');
        const monthName = new Date(year, month-1).toLocaleString('default', { month: 'long' });
        
        const div = document.createElement('div');
        div.className = 'bg-zinc-900 rounded-3xl p-6';
        div.innerHTML = `
          <div class="flex justify-between items-center mb-6">
            <div>
              <div class="font-semibold text-lg">${monthName} ${year}</div>
              <div class="text-emerald-400 text-xl font-medium">$${total.toFixed(2)}</div>
            </div>
            <button onclick="exportMonthPDF('${monthKey}')" 
                    class="bg-zinc-800 hover:bg-zinc-700 px-5 py-3 rounded-2xl text-sm flex items-center gap-2">
              <i class="fa-solid fa-download"></i> PDF
            </button>
          </div>
          <div class="text-xs text-zinc-500 mb-3">TRANSACTIONS (${monthExpenses.length})</div>
        `;
        container.appendChild(div);
      });
      
      if (Object.keys(grouped).length === 0) {
        container.innerHTML = `<p class="text-center text-zinc-500 py-12">No monthly data yet</p>`;
      }
    }

    function switchTab(n) {
      document.getElementById('history-tab').classList.toggle('hidden', n !== 0);
      document.getElementById('monthly-tab').classList.toggle('hidden', n !== 1);
      
      document.querySelectorAll('.tab-btn').forEach((el, i) => {
        if (i === n) {
          el.classList.add('border-b-2', 'border-emerald-500', 'text-emerald-400');
        } else {
          el.classList.remove('border-b-2', 'border-emerald-500', 'text-emerald-400');
        }
      });
    }

    let currentImage = null;

    function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(ev) {
        currentImage = ev.target.result;
        document.getElementById('upload-area').classList.add('hidden');
        const previewArea = document.getElementById('preview-area');
        previewArea.classList.remove('hidden');
        document.getElementById('receipt-preview').src = currentImage;
        
        // Simulate smart detection
        simulateDetection();
      };
      reader.readAsDataURL(file);
    }

    function simulateDetection() {
      // Fake AI detection
      const merchants = ["Sushi Bar", "Starbucks HK", "CitySuper", "Pacific Coffee", "McDonald's", "Haidilao"];
      const randomMerchant = merchants[Math.floor(Math.random() * merchants.length)];
      
      document.getElementById('expense-merchant').value = randomMerchant;
      
      const randomAmount = (Math.random() * 450 + 35).toFixed(2);
      document.getElementById('expense-amount').value = randomAmount;
      
      // Set today's date
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('expense-date').value = today;
    }

    function removeImage() {
      currentImage = null;
      document.getElementById('preview-area').classList.add('hidden');
      document.getElementById('upload-area').classList.remove('hidden');
      document.getElementById('receipt-upload').value = '';
    }

    function showAddModal() {
      document.getElementById('add-modal').classList.remove('hidden');
      currentImage = null;
      document.getElementById('preview-area').classList.add('hidden');
      document.getElementById('upload-area').classList.remove('hidden');
      
      // Reset form
      document.getElementById('expense-merchant').value = '';
      document.getElementById('expense-amount').value = '';
      document.getElementById('expense-date').value = new Date().toISOString().split('T')[0];
    }

    function hideAddModal() {
      document.getElementById('add-modal').classList.add('hidden');
    }

    function saveExpense() {
      const merchant = document.getElementById('expense-merchant').value.trim();
      const amount = document.getElementById('expense-amount').value;
      const date = document.getElementById('expense-date').value;
      const category = document.getElementById('expense-category').value;
      
      if (!merchant || !amount || !date) {
        alert("Please fill in merchant, amount and date");
        return;
      }
      
      expenses.push({
        id: Date.now(),
        date: date,
        merchant: merchant,
        amount: parseFloat(amount),
        category: category,
        image: currentImage
      });
      
      saveToLocal();
      renderHistory();
      calculateMonthlyTotal();
      renderMonthly();
      hideAddModal();
    }

    function exportMonthPDF(monthKey) {
      const [year, month] = monthKey.split('-');
      const monthName = new Date(year, month-1).toLocaleString('default', { month: 'long' });
      
      const filtered = expenses.filter(exp => {
        const d = new Date(exp.date);
        return d.getFullYear() === parseInt(year) && d.getMonth() + 1 === parseInt(month);
      });
      
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      
      doc.setFont("helvetica", "bold");
      doc.setFontSize(20);
      doc.text(`Expense Report - ${monthName} ${year}`, 20, 25);
      
      doc.setFontSize(11);
      doc.setFont("helvetica", "normal");
      
      let y = 45;
      let total = 0;
      
      filtered.forEach(exp => {
        doc.text(`${formatDate(exp.date)}`, 20, y);
        doc.text(exp.merchant, 70, y);
        doc.text(`$${parseFloat(exp.amount).toFixed(2)}`, 160, y);
        total += parseFloat(exp.amount);
        y += 10;
      });
      
      doc.setFont("helvetica", "bold");
      doc.text(`Total: $${total.toFixed(2)}`, 20, y + 15);
      
      doc.save(`receiptly_${monthName.toLowerCase()}_${year}.pdf`);
    }

    // Initialize
    window.onload = function() {
      renderHistory();
      calculateMonthlyTotal();
      renderMonthly();
      switchTab(0);
      
      // Make upload area clickable
      document.getElementById('upload-area').addEventListener('click', () => {
        document.getElementById('receipt-upload').click();
      });
    };
  </script>
</body>
</html>
