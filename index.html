<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Car Parks</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 2026 行動端無縫雙按鈕與頂部浮動狀態島樣式擴充 */
        .parking-tracker-btn-container {
            display: flex;
            width: 100%;
            border-top: 1px solid #e2e8f0;
            margin-top: 12px;
            box-sizing: border-box;
            background-color: #f8fafc;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            overflow: hidden;
        }

        .parking-action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 8px;
            font-size: 14px;
            font-weight: 600;
            background: none;
            border: none;
            cursor: pointer;
            color: #475569;
            transition: all 0.2s ease-in-out;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .parking-map-view-btn {
            border-right: 1px solid #e2e8f0;
        }

        .parking-map-view-btn:active {
            background-color: #f1f5f9;
        }

        .parking-tracker-toggle-btn {
            color: #2563eb;
        }

        .parking-tracker-toggle-btn:active {
            background-color: #eff6ff;
        }

        .parking-tracker-toggle-btn.tracking-confirming {
            background-color: #eff6ff;
            color: #1e40af;
            font-size: 11px;
            line-height: 1.3;
            padding: 6px 8px;
            pointer-events: none;
            text-align: center;
        }

        .parking-tracker-toggle-btn.tracking-active {
            background-color: #2563eb;
            color: #ffffff;
        }

        .parking-tracker-toggle-btn.tracking-active:active {
            background-color: #1d4ed8;
        }

        /* 頂部浮動狀態島 UI 佈局（完全避開右下角關閉地圖按鈕） */
        #mobile-top-tracker-island {
            position: fixed;
            top: 130px; /* 安全浮動於置頂導航欄下方 */
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            background-color: #0f172a;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 12px 16px;
            z-index: 999999;
            box-sizing: border-box;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            animation: islandSlideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .island-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 6px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .island-pulse {
            width: 6px;
            height: 6px;
            background-color: #3b82f6;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.6);
            animation: islandPulseGlow 2s infinite;
        }

        .island-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-top: 1px solid #334155;
        }

        .island-row:first-of-type {
            border-top: none;
        }

        .island-carpark-name {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 75%;
            color: #f1f5f9;
        }

        .island-cancel-btn {
            background-color: #334155;
            border: none;
            color: #f8fafc;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .island-cancel-btn:active {
            background-color: #475569;
        }

        @keyframes islandSlideDown {
            from { transform: translate(-50%, -30px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        @keyframes islandPulseGlow {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.6); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body>

    <div class="sticky-header-wrapper">
        <div class="header-container">
            <button id="homeBtn" class="icon-btn" aria-label="主頁"></button>
            <div class="header-actions">
                <button id="themeToggleBtn" class="icon-btn" onclick="toggleTheme()" aria-label="切換主題"></button>
                <button id="showFavBtn" class="icon-btn" aria-label="我的收藏"></button>
                <button id="searchToggleBtn" class="icon-btn" aria-label="展開搜尋"></button>
                <button id="refreshBtn" class="icon-btn" aria-label="更新數據"></button>
                <button id="locateBtn" class="icon-btn" aria-label="GPS 定位"></button>
            </div>
        </div>

        <div class="tab-container">
            <button id="tabOffStreet" class="tab-btn active" onclick="switchTab('offstreet')">室內停車場</button>
            <button id="tabMetered" class="tab-btn" onclick="switchTab('metered')">路邊咪錶位</button>
            <button id="tabToilet" class="tab-btn" onclick="switchTab('toilet')">公廁</button>
        </div>
        
        <div id="searchWrapper" class="search-dropdown">
            <div class="search-bar-container">
                <input type="text" id="searchInput" placeholder="搜尋香港地址、大廈、商場或街道...">
                <button id="searchBtn" class="search-action-btn">搜尋</button>
            </div>
        </div>

        <div id="history-wrapper" class="history-container" style="display: none;">
            <div id="historyChips" class="chips-row"></div>
            <button id="clearHistoryBtn" class="clear-btn">清除</button>
        </div>
    </div>

    <p id="status"></p>
    
    <div id="fav-wrapper" style="display:none;">
        <div class="section-title" id="ui-fav-title">我的收藏夾</div>
        <div id="favoritesList"></div>
    </div>

    <div id="filter-container" style="display: none;"></div>

    <div class="section-title" id="ui-search-title">搜尋結果</div>
    <div id="searchSubtitle" class="search-subtitle" style="display: none;"></div>
    <div id="results"></div>

    <button id="backToTopBtn" class="back-to-top" aria-label="回到頂部"></button>
    
    <script src="config.js"></script>
    <script src="templates.js"></script>
    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="map.js"></script>
    <script src="parkingTracker.js"></script>
    <script src="app.js"></script>

</body>
</html>
