<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receiptly • Smart HK Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .receipt-preview { max-height: 380px; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-xl mx-auto">
    <header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50 px-6 py-5">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-xl font-bold">R</div>
          <div>
            <h1 class="text-2xl font-semibold tracking-tight">Receiptly</h1>
            <p class="text-xs text-emerald-400 -mt-1">Server OCR</p>
          </div>
        </div>
      </div>
    </header>

    <div class="px-6 pt-6 pb-24">
      <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="bg-zinc-900 rounded-3xl p-5">
          <div class="text-zinc-400 text-sm">This Month</div>
          <div id="monthly-total" class="text-4xl font-semibold mt-2 text-emerald-400">$0.00</div>
        </div>
        <div class="bg-zinc-900 rounded-3xl p-5">
          <div class="text-zinc-400 text-sm">Total Expenses</div>
          <div id="total-expenses" class="text-4xl font-semibold mt-2">$0.00</div>
        </div>
      </div>

      <div class="flex border-b border-zinc-800 mb-6">
        <button onclick="switchTab(0)" id="tab-0" class="tab-btn flex-1 py-4 text-center font-medium border-b-2 border-emerald-500 text-emerald-400">History</button>
        <button onclick="switchTab(1)" id="tab-1" class="tab-btn flex-1 py-4 text-center font-medium text-zinc-400">Monthly</button>
      </div>

      <div id="history-tab">
        <div id="expense-list" class="space-y-3"></div>
      </div>

      <div id="monthly-tab" class="hidden">
        <div id="monthly-list" class="space-y-4"></div>
      </div>
    </div>

    <div onclick="showAddModal()" class="fixed bottom-8 right-8 w-16 h-16 bg-emerald-500 hover:bg-emerald-600 rounded-3xl flex items-center justify-center shadow-2xl text-3xl active:scale-95 transition-all z-50">
      <i class="fa-solid fa-camera"></i>
    </div>
  </div>

  <!-- Modal -->
  <div id="add-modal" class="hidden fixed inset-0 bg-black/80 flex items-end z-[100]">
    <div class="bg-zinc-900 w-full rounded-t-3xl max-h-[92vh] overflow-auto">
      <div class="px-6 py-6">
        <div class="flex justify-between items-center mb-6">
          <h2 id="modal-title" class="text-2xl font-semibold">New Expense</h2>
          <button onclick="hideAddModal()" class="text-3xl text-zinc-400">✕</button>
        </div>

        <div id="upload-area" class="border-2 border-dashed border-zinc-700 hover:border-emerald-500 rounded-3xl h-64 flex flex-col items-center justify-center cursor-pointer mb-6" onclick="document.getElementById('receipt-upload').click()">
          <input type="file" id="receipt-upload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
          <i class="fa-solid fa-camera text-5xl mb-4 text-emerald-500"></i>
          <p class="font-medium">Upload Receipt Photo</p>
          <p class="text-xs text-zinc-500">Server-side OCR</p>
        </div>

        <div id="preview-area" class="hidden mb-6">
          <img id="receipt-preview" class="w-full rounded-3xl receipt-preview object-contain bg-zinc-950">
          <button onclick="reRunOCR()" class="mt-3 text-emerald-400 flex items-center gap-2 text-sm">
            <i class="fa-solid fa-redo"></i> Re-run OCR
          </button>
        </div>

        <div class="space-y-5">
          <div>
            <label class="block text-zinc-400 text-sm mb-2">Date</label>
            <input id="expense-date" type="date" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
          </div>
          <div>
            <label class="block text-zinc-400 text-sm mb-2">Merchant</label>
            <input id="expense-merchant" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
          </div>
          <div>
            <label class="block text-zinc-400 text-sm mb-2">Amount (HKD)</label>
            <div class="relative">
              <span class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400">$</span>
              <input id="expense-amount" type="number" step="0.01" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-12 py-4 text-white text-lg font-medium">
            </div>
          </div>

          <div class="pt-4 flex gap-3">
            <button onclick="hideAddModal()" class="flex-1 py-5 rounded-3xl border border-zinc-700">Cancel</button>
            <button onclick="saveExpense()" class="flex-1 bg-emerald-500 py-5 rounded-3xl font-semibold">Save Expense</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let expenses = JSON.parse(localStorage.getItem('receiptly_expenses')) || [];
    let currentImage = null;

    async function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async (ev) => {
        currentImage = ev.target.result;
        document.getElementById('upload-area').classList.add('hidden');
        document.getElementById('preview-area').classList.remove('hidden');
        document.getElementById('receipt-preview').src = currentImage;

        await processWithServerOCR(currentImage);
      };
      reader.readAsDataURL(file);
    }

    async function processWithServerOCR(imageDataUrl) {
      const loading = document.createElement('div');
      loading.className = "text-center text-emerald-400 mt-4";
      loading.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Server OCR...`;
      document.getElementById('preview-area').appendChild(loading);

      try {
        const base64 = imageDataUrl.split(',')[1];

        const res = await fetch('/api/ocr', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: base64 })
        });

        const data = await res.json();

        if (data.error) {
          alert(data.error);
          return;
        }

        document.getElementById('expense-merchant').value = data.merchant || "Restaurant";
        if (data.amount) document.getElementById('expense-amount').value = data.amount.toFixed(2);
        if (data.date) document.getElementById('expense-date').value = data.date;

      } catch (err) {
        alert("Server OCR failed. Please try again.");
      } finally {
        loading.remove();
      }
    }

    function reRunOCR() {
      if (currentImage) processWithServerOCR(currentImage);
    }

    // ... (rest of your functions: saveExpense, renderHistory, etc. - same as before)
    function saveExpense() { /* your existing save logic */ }
    function removeImage() { /* your existing */ }
    function showAddModal() { /* your existing */ }
    function hideAddModal() { /* your existing */ }
    function renderHistory() { /* your existing */ }
    function calculateMonthlyTotal() { /* your existing */ }
    function renderMonthly() { /* your existing */ }
    function switchTab(n) { /* your existing */ }

    window.onload = () => {
      renderHistory();
      calculateMonthlyTotal();
      switchTab(0);
    };
  </script>
</body>
</html>
