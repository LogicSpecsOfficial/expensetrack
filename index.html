<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Car Parks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header-container">
        <h1 id="ui-title">最近的香港停車場</h1>
        <select id="langSelect">
            <option value="zh_TW" selected>繁體中文</option>
            <option value="en_US">English</option>
        </select>
    </div>

    <div class="tab-container">
        <button id="tabOffStreet" class="tab-btn active" onclick="switchTab('offstreet')">室內停車場</button>
        <button id="tabMetered" class="tab-btn" onclick="switchTab('metered')">路邊咪錶位</button>
    </div>
    
    <div class="action-group">
        <button id="locateBtn" class="main-btn">尋找最近的停車場</button>
        <button id="showFavBtn" class="secondary-btn">顯示我的收藏</button>
    </div>

    <p id="status"></p>
    <p id="countdownText"></p>
    
    <div id="fav-wrapper" style="display:none;">
        <div class="section-title" id="ui-fav-title">我的收藏夾</div>
        <div id="favoritesList"></div>
    </div>

    <div class="section-title" id="ui-search-title">搜尋結果</div>
    <div id="results"></div>

    <script src="app.js"></script>
</body>
</html>
