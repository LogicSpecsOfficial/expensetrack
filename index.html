<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receiptly • Smart HK Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .receipt-preview { max-height: 340px; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-xl mx-auto">
    <!-- Header -->
    <header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50 px-6 py-5">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-xl font-bold">R</div>
          <div>
            <h1 class="text-2xl font-semibold tracking-tight">Receiptly</h1>
            <p class="text-xs text-emerald-400 -mt-1">OCR.space Powered</p>
          </div>
        </div>
      </div>
    </header>

    <div class="px-6 pt-6 pb-24">
      <!-- Summary -->
      <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="bg-zinc-900 rounded-3xl p-5">
          <div class="text-zinc-400 text-sm">This Month</div>
          <div id="monthly-total" class="text-4xl font-semibold mt-2 text-emerald-400">$0.00</div>
        </div>
        <div class="bg-zinc-900 rounded-3xl p-5">
          <div class="text-zinc-400 text-sm">Total Expenses</div>
          <div id="total-expenses" class="text-4xl font-semibold mt-2">$0.00</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex border-b border-zinc-800 mb-6">
        <button onclick="switchTab(0)" id="tab-0" class="tab-btn flex-1 py-4 text-center font-medium border-b-2 border-emerald-500 text-emerald-400">History</button>
        <button onclick="switchTab(1)" id="tab-1" class="tab-btn flex-1 py-4 text-center font-medium text-zinc-400">Monthly</button>
      </div>

      <!-- History Tab -->
      <div id="history-tab">
        <div id="expense-list" class="space-y-3"></div>
      </div>

      <!-- Monthly Tab -->
      <div id="monthly-tab" class="hidden">
        <div id="monthly-list" class="space-y-4"></div>
      </div>
    </div>

    <!-- FAB -->
    <div onclick="showAddModal()" class="fixed bottom-8 right-8 w-16 h-16 bg-emerald-500 hover:bg-emerald-600 rounded-3xl flex items-center justify-center shadow-2xl text-3xl active:scale-95 transition-all z-50">
      <i class="fa-solid fa-camera"></i>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="add-modal" class="hidden fixed inset-0 bg-black/80 flex items-end z-[100]">
    <div class="bg-zinc-900 w-full rounded-t-3xl max-h-[92vh] overflow-auto">
      <div class="px-6 py-6">
        <div class="flex justify-between items-center mb-6">
          <h2 id="modal-title" class="text-2xl font-semibold">New Expense</h2>
          <button onclick="hideAddModal()" class="text-zinc-400 text-3xl">✕</button>
        </div>

        <!-- Upload Area -->
        <div id="upload-area" class="border-2 border-dashed border-zinc-700 hover:border-emerald-500 rounded-3xl h-64 flex flex-col items-center justify-center cursor-pointer mb-6 transition-all"
             onclick="document.getElementById('receipt-upload').click()">
          <input type="file" id="receipt-upload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
          <i class="fa-solid fa-cloud-arrow-up text-5xl mb-4 text-emerald-500"></i>
          <p class="font-medium">Upload Receipt Photo</p>
          <p class="text-xs text-zinc-500">OCR.space will auto-detect amount, date & merchant</p>
        </div>

        <div id="preview-area" class="hidden mb-6">
          <img id="receipt-preview" class="w-full rounded-3xl receipt-preview object-contain bg-zinc-950">
          <button onclick="removeImage()" class="mt-3 text-red-400 flex items-center gap-2 text-sm">
            <i class="fa-solid fa-trash"></i> Remove Photo
          </button>
        </div>

        <!-- Form -->
        <div class="space-y-5">
          <div>
            <label class="block text-zinc-400 text-sm mb-2">Date</label>
            <input id="expense-date" type="date" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
          </div>

          <div>
            <label class="block text-zinc-400 text-sm mb-2">Merchant / Restaurant</label>
            <input id="expense-merchant" type="text" placeholder="e.g. Seiko Restaurant" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
          </div>

          <div>
            <label class="block text-zinc-400 text-sm mb-2">Amount (HKD)</label>
            <div class="relative">
              <span class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400">$</span>
              <input id="expense-amount" type="number" step="0.01" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-12 py-4 text-white text-lg font-medium">
            </div>
          </div>

          <div>
            <label class="block text-zinc-400 text-sm mb-2">Category</label>
            <select id="expense-category" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
              <option value="Food">🍽️ Food & Drink</option>
              <option value="Transport">🚕 Transport</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Groceries">🛒 Groceries</option>
              <option value="Entertainment">🎬 Entertainment</option>
              <option value="Other">📌 Other</option>
            </select>
          </div>

          <div class="pt-4 flex gap-3">
            <button onclick="hideAddModal()" class="flex-1 py-5 rounded-3xl font-semibold border border-zinc-700">Cancel</button>
            <button onclick="saveExpense()" id="save-btn" class="flex-1 bg-emerald-500 hover:bg-emerald-600 py-5 rounded-3xl font-semibold text-lg">Save Expense</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ================== YOUR OCR.space API KEY ==================
    const OCR_API_KEY = "K81043441588957";
    // ===========================================================

    let expenses = JSON.parse(localStorage.getItem('receiptly_expenses')) || [];
    let editingId = null;
    let currentImage = null;

    function saveToLocal() {
      localStorage.setItem('receiptly_expenses', JSON.stringify(expenses));
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function getCategoryEmoji(cat) {
      const emojis = { 'Food': '🍔', 'Transport': '🚕', 'Shopping': '👕', 'Groceries': '🥕', 'Entertainment': '🎥', 'Other': '📌' };
      return emojis[cat] || '📌';
    }

    async function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function(ev) {
        currentImage = ev.target.result;
        document.getElementById('upload-area').classList.add('hidden');
        document.getElementById('preview-area').classList.remove('hidden');
        document.getElementById('receipt-preview').src = currentImage;

        await runOCR(currentImage);
      };
      reader.readAsDataURL(file);
    }

    async function runOCR(imageDataUrl) {
      const loading = document.createElement('div');
      loading.className = "text-center text-emerald-400 mt-4 flex items-center justify-center gap-2";
      loading.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Calling OCR.space...`;
      document.getElementById('preview-area').appendChild(loading);

      try {
        const base64 = imageDataUrl.split(',')[1];

        const formData = new FormData();
        formData.append('base64Image', `data:image/jpeg;base64,${base64}`);
        formData.append('language', 'chi_tra+eng');
        formData.append('isTable', 'true');
        formData.append('OCREngine', '2');
        formData.append('scale', 'true');

        const res = await fetch('https://api.ocr.space/parse/image', {
          method: 'POST',
          headers: { 'apikey': OCR_API_KEY },
          body: formData
        });

        const data = await res.json();

        if (data.IsErroredOnProcessing) {
          alert("OCR Error: " + (data.ErrorMessage ? data.ErrorMessage[0] : 'Unknown error'));
          return;
        }

        const text = data.ParsedResults[0].ParsedText || "";
        console.log("✅ OCR Result:", text);

        // Smart extraction for your receipts
        // Amount (look for 總金額 first, then largest number)
        let amount = null;
        const totalMatch = text.match(/總金額.*?\$?([\d,]+\.?\d*)/i);
        if (totalMatch) {
          amount = parseFloat(totalMatch[1].replace(/,/g, ''));
        } else {
          const money = text.match(/\$?(\d{1,3}(?:,\d{3})*(?:\.\d{2})?)/g);
          if (money) {
            let max = 0;
            money.forEach(m => {
              const num = parseFloat(m.replace(/[$,]/g, ''));
              if (num > max && num < 50000) max = num;
            });
            amount = max;
          }
        }

        // Date (YYYY/MM/DD format)
        const dateMatch = text.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
        let dateStr = new Date().toISOString().split('T')[0];
        if (dateMatch) {
          dateStr = `${dateMatch[1]}-${dateMatch[2].padStart(2,'0')}-${dateMatch[3].padStart(2,'0')}`;
        }

        // Merchant (first meaningful line)
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 4);
        let merchant = lines[0] || "Restaurant";

        // Fill the form
        document.getElementById('expense-merchant').value = merchant;
        if (amount) document.getElementById('expense-amount').value = amount.toFixed(2);
        document.getElementById('expense-date').value = dateStr;

      } catch (err) {
        console.error(err);
        alert("OCR failed. You can still fill manually.");
      } finally {
        loading.remove();
      }
    }

    function removeImage() {
      currentImage = null;
      document.getElementById('preview-area').classList.add('hidden');
      document.getElementById('upload-area').classList.remove('hidden');
    }

    function showAddModal() {
      editingId = null;
      document.getElementById('modal-title').textContent = "New Expense";
      document.getElementById('save-btn').textContent = "Save Expense";
      document.getElementById('add-modal').classList.remove('hidden');
      document.getElementById('preview-area').classList.add('hidden');
      document.getElementById('upload-area').classList.remove('hidden');

      document.getElementById('expense-merchant').value = '';
      document.getElementById('expense-amount').value = '';
      document.getElementById('expense-date').value = new Date().toISOString().split('T')[0];
    }

    function hideAddModal() {
      document.getElementById('add-modal').classList.add('hidden');
    }

    function saveExpense() {
      const merchant = document.getElementById('expense-merchant').value.trim();
      const amount = parseFloat(document.getElementById('expense-amount').value);
      const date = document.getElementById('expense-date').value;
      const category = document.getElementById('expense-category').value;

      if (!merchant || isNaN(amount) || !date) {
        alert("Please fill merchant, amount and date");
        return;
      }

      if (editingId) {
        const exp = expenses.find(e => e.id === editingId);
        if (exp) {
          exp.merchant = merchant;
          exp.amount = amount;
          exp.date = date;
          exp.category = category;
          if (currentImage) exp.image = currentImage;
        }
      } else {
        expenses.push({
          id: Date.now(),
          date: date,
          merchant: merchant,
          amount: amount,
          category: category,
          image: currentImage
        });
      }

      saveToLocal();
      renderHistory();
      calculateMonthlyTotal();
      renderMonthly();
      hideAddModal();
    }

    // Edit & Delete
    function editExpense(id) {
      const exp = expenses.find(e => e.id === id);
      if (!exp) return;
      editingId = id;
      document.getElementById('modal-title').textContent = "Edit Expense";
      document.getElementById('save-btn').textContent = "Update";
      document.getElementById('expense-merchant').value = exp.merchant;
      document.getElementById('expense-amount').value = exp.amount;
      document.getElementById('expense-date').value = exp.date;
      document.getElementById('expense-category').value = exp.category || 'Food';

      if (exp.image) {
        currentImage = exp.image;
        document.getElementById('upload-area').classList.add('hidden');
        document.getElementById('preview-area').classList.remove('hidden');
        document.getElementById('receipt-preview').src = exp.image;
      } else {
        document.getElementById('preview-area').classList.add('hidden');
        document.getElementById('upload-area').classList.remove('hidden');
      }
      document.getElementById('add-modal').classList.remove('hidden');
    }

    function deleteExpense(id) {
      if (confirm("Delete this expense?")) {
        expenses = expenses.filter(e => e.id !== id);
        saveToLocal();
        renderHistory();
        calculateMonthlyTotal();
        renderMonthly();
      }
    }

    function renderHistory() {
      const container = document.getElementById('expense-list');
      container.innerHTML = expenses.length === 0 
        ? `<div class="text-center py-20 text-zinc-500">No expenses yet</div>` 
        : '';

      expenses.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(exp => {
        const div = document.createElement('div');
        div.className = 'bg-zinc-900 rounded-3xl p-5';
        div.innerHTML = `
          <div class="flex gap-4">
            <div class="w-14 h-14 bg-zinc-800 rounded-2xl flex items-center justify-center text-3xl">${getCategoryEmoji(exp.category)}</div>
            <div class="flex-1">
              <div class="flex justify-between">
                <div>
                  <div class="font-semibold">${exp.merchant}</div>
                  <div class="text-xs text-zinc-500">${formatDate(exp.date)}</div>
                </div>
                <div class="text-right font-semibold text-xl">$${parseFloat(exp.amount).toFixed(2)}</div>
              </div>
              ${exp.image ? `<img src="${exp.image}" class="mt-4 rounded-2xl max-h-48 object-contain">` : ''}
              <div class="flex gap-3 mt-4">
                <button onclick="editExpense(${exp.id});event.stopImmediatePropagation()" class="flex-1 py-3 bg-zinc-800 rounded-2xl text-sm">Edit</button>
                <button onclick="deleteExpense(${exp.id});event.stopImmediatePropagation()" class="flex-1 py-3 bg-red-900/50 text-red-400 rounded-2xl text-sm">Delete</button>
              </div>
            </div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function calculateMonthlyTotal() {
      const now = new Date();
      let monthTotal = 0, allTotal = 0;
      expenses.forEach(exp => {
        const amt = parseFloat(exp.amount);
        allTotal += amt;
        const d = new Date(exp.date);
        if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) monthTotal += amt;
      });
      document.getElementById('monthly-total').textContent = '$' + monthTotal.toFixed(2);
      document.getElementById('total-expenses').textContent = '$' + allTotal.toFixed(2);
    }

    function renderMonthly() {
      const container = document.getElementById('monthly-list');
      container.innerHTML = '';
      const grouped = {};
      expenses.forEach(exp => {
        const key = exp.date.substring(0,7);
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(exp);
      });
      Object.keys(grouped).sort().reverse().forEach(key => {
        const list = grouped[key];
        const total = list.reduce((sum, e) => sum + parseFloat(e.amount), 0);
        const [year, month] = key.split('-');
        const monthName = new Date(year, month-1).toLocaleString('default', { month: 'long' });
        const div = document.createElement('div');
        div.className = 'bg-zinc-900 rounded-3xl p-6';
        div.innerHTML = `
          <div class="flex justify-between items-center">
            <div>
              <div class="font-semibold">${monthName} ${year}</div>
              <div class="text-emerald-400 text-2xl">$${total.toFixed(2)}</div>
            </div>
            <button onclick="exportMonthPDF('${key}')" class="bg-zinc-800 px-6 py-3 rounded-2xl text-sm flex items-center gap-2">
              <i class="fa-solid fa-download"></i> PDF
            </button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function switchTab(n) {
      document.getElementById('history-tab').classList.toggle('hidden', n !== 0);
      document.getElementById('monthly-tab').classList.toggle('hidden', n !== 1);
      document.querySelectorAll('.tab-btn').forEach((el, i) => {
        if (i === n) {
          el.classList.add('border-b-2', 'border-emerald-500', 'text-emerald-400');
        } else {
          el.classList.remove('border-b-2', 'border-emerald-500', 'text-emerald-400');
        }
      });
    }

    function exportMonthPDF(key) {
      const [year, month] = key.split('-');
      const monthName = new Date(year, month-1).toLocaleString('default', { month: 'long' });
      const filtered = expenses.filter(e => e.date.startsWith(key));
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(20);
      doc.text(`Receiptly - ${monthName} ${year}`, 20, 25);
      let y = 45;
      let total = 0;
      filtered.forEach(exp => {
        doc.setFontSize(11);
        doc.text(formatDate(exp.date), 20, y);
        doc.text(exp.merchant, 70, y);
        doc.text(`$${exp.amount.toFixed(2)}`, 160, y);
        total += parseFloat(exp.amount);
        y += 12;
      });
      doc.setFontSize(14);
      doc.text(`Total: $${total.toFixed(2)}`, 20, y + 15);
      doc.save(`receiptly_${monthName.toLowerCase()}_${year}.pdf`);
    }

    window.onload = () => {
      renderHistory();
      calculateMonthlyTotal();
      renderMonthly();
      switchTab(0);
    };
  </script>
</body>
</html>
