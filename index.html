<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ExpenseTrack Parking</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="style.css">
  <style>
    /* New Feature Specific CSS Adjustments */
    .carpark-card {
      position: relative;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .carpark-card.tracking-active {
      border-color: #3b82f6;
      background: #f8fafc;
    }

    .carpark-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .carpark-name {
      font-size: 16px;
      font-weight: 600;
      color: #1e293b;
      margin: 0;
    }

    .space-badge {
      font-size: 14px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 6px;
      background: #ef4444;
      color: #ffffff;
    }

    .space-badge.available {
      background: #22c55e;
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .notification-bell-btn {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      outline: none;
      transition: all 0.2s ease;
    }

    .notification-bell-btn.active {
      color: #ffffff;
      background: #3b82f6;
      border-color: #2563eb;
    }

    /* Floating Dynamic Island Panel UI */
    #tracking-control-panel {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 400px;
      background: #1e293b;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      border-radius: 30px;
      padding: 12px 20px;
      z-index: 9999;
      box-sizing: border-box;
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .panel-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-status {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-text {
      color: #f8fafc;
      font-size: 14px;
      font-weight: 500;
    }

    .pulse-indicator {
      width: 8px;
      height: 8px;
      background: #3b82f6;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
      animation: pulse 2s infinite;
    }

    .stop-panel-btn {
      background: #ef4444;
      color: #ffffff;
      border: none;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 20px;
      cursor: pointer;
    }

    @keyframes slideUp {
      from { transform: translate(-50%, 100px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(59, 130, 246, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }
  </style>
</head>
<body>

  <div id="app-wrapper">
    <!-- Header Navigation Shell -->
    <header id="main-header">
      <h1>ExpenseTrack Parking</h1>
    </header>

    <!-- Main Dynamic Content Wrapper -->
    <main id="content-container">
      <div id="carpark-list-container">
        
        <!-- Carpark Card Item 1 (Example State: Locked/No Spaces) -->
        <div class="carpark-card" data-id="cp-001" data-lat="22.3193" data-lng="114.1694">
          <div class="carpark-header">
            <h2 class="carpark-name">Metropolitan Street Carpark</h2>
            <span class="space-badge">0</span>
          </div>
          <div class="card-actions">
            <button class="notification-bell-btn">Track Spaces</button>
          </div>
        </div>

        <!-- Carpark Card Item 2 (Example State: Free/Available Spaces) -->
        <div class="carpark-card" data-id="cp-002" data-lat="22.3215" data-lng="114.1721">
          <div class="carpark-header">
            <h2 class="carpark-name">Central Plaza Parking Lot</h2>
            <span class="space-badge available">4</span>
          </div>
          <div class="card-actions">
            <button class="notification-bell-btn">Track Spaces</button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Simulated Core Functions for Map Execution Safety -->
  <script>
    window.openMapPopup = function(lat, lng) {
      console.log('Map display requested coordinates:', lat, lng);
      // Native script processing mapping layers logic runs undisturbed here
    };
  </script>

  <!-- Codebase Core Module Inclusions -->
  <script src="config.js"></script>
  <script src="debug.js"></script>
  <script src="api.js"></script>
  <script src="templates.js"></script>
  <script src="ui.js"></script>
  <script src="map.js"></script>
  <!-- New Feature Integration Core Linkages -->
  <script src="parkingTracker.js"></script>
  <script src="app.js"></script>
</body>
</html>
