<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receiptly • Smart HK Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v5/dist/tesseract.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .receipt-preview { max-height: 380px; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-xl mx-auto">
    <header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50 px-6 py-5">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-xl font-bold">R</div>
          <div>
            <h1 class="text-2xl font-semibold tracking-tight">Receiptly</h1>
            <p class="text-xs text-emerald-400 -mt-1">HK Receipt Scanner</p>
          </div>
        </div>
      </div>
    </header>

    <div class="px-6 pt-6 pb-24">
      <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="bg-zinc-900 rounded-3xl p-5">
          <div class="text-zinc-400 text-sm">This Month</div>
          <div id="monthly-total" class="text-4xl font-semibold mt-2 text-emerald-400">$0.00</div>
        </div>
        <div class="bg-zinc-900 rounded-3xl p-5">
          <div class="text-zinc-400 text-sm">Total Expenses</div>
          <div id="total-expenses" class="text-4xl font-semibold mt-2">$0.00</div>
        </div>
      </div>

      <div class="flex border-b border-zinc-800 mb-6">
        <button onclick="switchTab(0)" id="tab-0" class="tab-btn flex-1 py-4 text-center font-medium border-b-2 border-emerald-500 text-emerald-400">History</button>
        <button onclick="switchTab(1)" id="tab-1" class="tab-btn flex-1 py-4 text-center font-medium text-zinc-400">Monthly</button>
      </div>

      <div id="history-tab">
        <div id="expense-list" class="space-y-3"></div>
      </div>

      <div id="monthly-tab" class="hidden">
        <div id="monthly-list" class="space-y-4"></div>
      </div>
    </div>

    <div onclick="showAddModal()" class="fixed bottom-8 right-8 w-16 h-16 bg-emerald-500 hover:bg-emerald-600 rounded-3xl flex items-center justify-center shadow-2xl text-3xl active:scale-95 transition-all z-50">
      <i class="fa-solid fa-camera"></i>
    </div>
  </div>

  <!-- Modal -->
  <div id="add-modal" class="hidden fixed inset-0 bg-black/80 flex items-end z-[100]">
    <div class="bg-zinc-900 w-full rounded-t-3xl max-h-[92vh] overflow-auto">
      <div class="px-6 py-6">
        <div class="flex justify-between items-center mb-6">
          <h2 id="modal-title" class="text-2xl font-semibold">New Expense</h2>
          <button onclick="hideAddModal()" class="text-3xl text-zinc-400">✕</button>
        </div>

        <div id="upload-area" class="border-2 border-dashed border-zinc-700 hover:border-emerald-500 rounded-3xl h-64 flex flex-col items-center justify-center cursor-pointer mb-6" onclick="document.getElementById('receipt-upload').click()">
          <input type="file" id="receipt-upload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
          <i class="fa-solid fa-camera text-5xl mb-4 text-emerald-500"></i>
          <p class="font-medium">Upload or Take Receipt Photo</p>
          <p class="text-xs text-zinc-500">Best with good lighting</p>
        </div>

        <div id="preview-area" class="hidden mb-6">
          <img id="receipt-preview" class="w-full rounded-3xl receipt-preview object-contain bg-zinc-950">
          <div class="flex gap-3 mt-4">
            <button onclick="removeImage()" class="flex-1 py-3 bg-red-900/30 text-red-400 rounded-2xl">Remove</button>
            <button onclick="reRunOCR()" class="flex-1 py-3 bg-emerald-600 rounded-2xl">Re-run OCR</button>
          </div>
        </div>

        <div class="space-y-5">
          <div>
            <label class="block text-zinc-400 text-sm mb-2">Date</label>
            <input id="expense-date" type="date" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
          </div>
          <div>
            <label class="block text-zinc-400 text-sm mb-2">Merchant</label>
            <input id="expense-merchant" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-white">
          </div>
          <div>
            <label class="block text-zinc-400 text-sm mb-2">Amount (HKD)</label>
            <div class="relative">
              <span class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400">$</span>
              <input id="expense-amount" type="number" step="0.01" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-12 py-4 text-white text-lg font-medium">
            </div>
          </div>

          <div class="pt-4 flex gap-3">
            <button onclick="hideAddModal()" class="flex-1 py-5 rounded-3xl border border-zinc-700">Cancel</button>
            <button onclick="saveExpense()" class="flex-1 bg-emerald-500 py-5 rounded-3xl font-semibold">Save Expense</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let expenses = JSON.parse(localStorage.getItem('receiptly_expenses')) || [];
    let currentImage = null;

    async function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async (ev) => {
        currentImage = ev.target.result;
        document.getElementById('upload-area').classList.add('hidden');
        document.getElementById('preview-area').classList.remove('hidden');
        document.getElementById('receipt-preview').src = currentImage;
        await runOCR(currentImage);
      };
      reader.readAsDataURL(file);
    }

    async function preprocessImage(src) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          const scale = 2.0;
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;

          for (let i = 0; i < data.length; i += 4) {
            let gray = data[i] * 0.3 + data[i+1] * 0.59 + data[i+2] * 0.11;
            gray = gray < 120 ? 0 : 255; // aggressive binarization for receipts
            data[i] = data[i+1] = data[i+2] = gray;
          }
          ctx.putImageData(imageData, 0, 0);
          resolve(canvas.toDataURL('image/jpeg', 0.92));
        };
        img.src = src;
      });
    }

    async function runOCR(imageDataUrl) {
      const loading = document.createElement('div');
      loading.className = "text-center text-emerald-400 mt-4 flex items-center justify-center gap-2";
      loading.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Scanning Receipt...`;
      document.getElementById('preview-area').appendChild(loading);

      try {
        const processed = await preprocessImage(imageDataUrl);

        const worker = await Tesseract.createWorker(['eng', 'chi_tra'], 1, {
          logger: m => console.log(m)
        });

        const { data: { text } } = await worker.recognize(processed);
        await worker.terminate();

        console.log("OCR Output:", text);

        // Strong extraction for your receipt style
        const totalMatch = text.match(/總金額.*?\$?([\d,]+\.?\d*)/i) || text.match(/\$?(\d{1,3}(?:,\d{3})*(?:\.\d{2})?)/g);
        const dateMatch = text.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);

        let amount = null;
        if (totalMatch) {
          if (Array.isArray(totalMatch)) {
            amount = parseFloat(totalMatch[totalMatch.length-1].replace(/,/g, ''));
          } else {
            amount = parseFloat(totalMatch[1].replace(/,/g, ''));
          }
        }

        let date = new Date().toISOString().split('T')[0];
        if (dateMatch) date = `${dateMatch[1]}-${dateMatch[2].padStart(2,'0')}-${dateMatch[3].padStart(2,'0')}`;

        let merchant = text.split('\n').find(l => l.length > 8 && !/^\d+$/.test(l.trim())) || "Restaurant";

        document.getElementById('expense-merchant').value = merchant.trim();
        if (amount) document.getElementById('expense-amount').value = amount.toFixed(2);
        document.getElementById('expense-date').value = date;

      } catch (e) {
        console.error(e);
        alert("OCR struggled. Please try a clearer photo or edit fields manually.");
      } finally {
        loading.remove();
      }
    }

    function reRunOCR() {
      if (currentImage) runOCR(currentImage);
    }

    function removeImage() {
      currentImage = null;
      document.getElementById('preview-area').classList.add('hidden');
      document.getElementById('upload-area').classList.remove('hidden');
    }

    function showAddModal() {
      document.getElementById('add-modal').classList.remove('hidden');
      document.getElementById('preview-area').classList.add('hidden');
      document.getElementById('upload-area').classList.remove('hidden');
      document.getElementById('expense-date').value = new Date().toISOString().split('T')[0];
    }

    function hideAddModal() {
      document.getElementById('add-modal').classList.add('hidden');
    }

    function saveExpense() {
      const merchant = document.getElementById('expense-merchant').value.trim();
      const amount = parseFloat(document.getElementById('expense-amount').value);
      const date = document.getElementById('expense-date').value;

      if (!merchant || isNaN(amount) || !date) {
        alert("Please fill merchant, amount and date");
        return;
      }

      expenses.push({
        id: Date.now(),
        date,
        merchant,
        amount,
        category: "Food",
        image: currentImage
      });

      saveToLocal();
      renderHistory();
      calculateMonthlyTotal();
      renderMonthly();
      hideAddModal();
    }

    function saveToLocal() { localStorage.setItem('receiptly_expenses', JSON.stringify(expenses)); }

    function formatDate(d) { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }

    function renderHistory() {
      const container = document.getElementById('expense-list');
      container.innerHTML = expenses.length === 0 ? `<div class="text-center py-20 text-zinc-500">No expenses yet</div>` : '';
      expenses.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(exp => {
        const div = document.createElement('div');
        div.className = 'bg-zinc-900 rounded-3xl p-5';
        div.innerHTML = `
          <div class="flex gap-4">
            <div class="w-14 h-14 bg-zinc-800 rounded-2xl flex items-center justify-center text-3xl">🍽️</div>
            <div class="flex-1">
              <div class="flex justify-between">
                <div>
                  <div class="font-semibold">${exp.merchant}</div>
                  <div class="text-xs text-zinc-500">${formatDate(exp.date)}</div>
                </div>
                <div class="text-xl font-semibold">$${parseFloat(exp.amount).toFixed(2)}</div>
              </div>
            </div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function calculateMonthlyTotal() {
      const now = new Date();
      let monthTotal = 0, total = 0;
      expenses.forEach(exp => {
        total += parseFloat(exp.amount);
        const d = new Date(exp.date);
        if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) monthTotal += parseFloat(exp.amount);
      });
      document.getElementById('monthly-total').textContent = '$' + monthTotal.toFixed(2);
      document.getElementById('total-expenses').textContent = '$' + total.toFixed(2);
    }

    function renderMonthly() {}

    function switchTab(n) {
      document.getElementById('history-tab').classList.toggle('hidden', n !== 0);
      document.getElementById('monthly-tab').classList.toggle('hidden', n !== 1);
    }

    window.onload = () => {
      renderHistory();
      calculateMonthlyTotal();
      switchTab(0);
    };
  </script>
</body>
</html>
