<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Car Parks</title>
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --surface: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent: #0d6efd;
            --accent-hover: #0b5ed7;
            --success: #198754;
            --danger: #dc3545;
            --border-color: #dee2e6;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding: 16px;
            line-height: 1.5;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.5px; white-space: nowrap; }

        select#langSelect {
            padding: 4px 8px;
            font-size: 0.8rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--surface);
            color: var(--text-main);
            width: auto;
            height: 28px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-item label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        select.form-select {
            padding: 8px 12px;
            font-size: 0.9rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--surface);
            color: var(--text-main);
            width: 100%;
        }

        .filter-container {
            background-color: var(--surface);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-container input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .filter-container label {
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
        }

        .action-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        button.main-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
            width: 100%;
        }

        button.main-btn:active { background-color: var(--accent-hover); }
        button.main-btn:disabled { background-color: var(--border-color); color: var(--text-muted); }

        button.secondary-btn {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px;
            font-size: 0.95rem;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 500;
            width: 100%;
        }

        button.secondary-btn:active { background-color: #e9ecef; }

        #status {
            margin: 12px 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 24px 0 12px 0;
            color: var(--text-main);
        }

        .carpark-card {
            background-color: var(--surface);
            padding: 16px;
            margin-bottom: 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .carpark-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .card-fav-btn {
            background-color: #f1f3f5;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
        }

        .card-fav-btn.active {
            background-color: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .tags-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 4px;
        }

        .government { background-color: #e2f0d9; color: #385723; }
        .commercial { background-color: #fff2cc; color: #7f6000; }
        .distance { font-size: 0.85rem; font-weight: 600; color: var(--danger); }

        .info-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 6px 12px;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .info-label { color: var(--text-muted); font-weight: 500; }

        .map-link, .phone-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .vacancy-box {
            margin-top: 14px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            background-color: #f8f9fa;
            border-left: 4px solid var(--border-color);
        }

        .vacancy-box.available {
            border-left-color: var(--success);
            background-color: #f4fbf7;
        }

        .vacancy-box.full {
            border-left-color: var(--danger);
            background-color: #fff5f5;
        }

        .vacancy-num { font-weight: 700; color: var(--success); }
        .vacancy-num.none { color: var(--danger); }

        .fee-box {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #495057;
            background-color: #f1f3f5;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .empty-notice {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 id="ui-title">最近的香港停車場</h1>
        <select id="langSelect">
            <option value="zh_TW" selected>繁體中文</option>
            <option value="en_US">English</option>
        </select>
    </div>

    <div class="controls-grid">
        <div class="control-item">
            <label id="ui-label-limit">顯示數量</label>
            <select id="limitSelect" class="form-select">
                <option value="5">5</option>
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="30" selected>30</option>
            </select>
        </div>
        <div class="control-item">
            <label id="ui-label-sort">排序方式</label>
            <select id="sortSelect" class="form-select">
                <option value="distance" selected>距離最近</option>
            </select>
        </div>
    </div>

    <div class="filter-container">
        <input type="checkbox" id="vacancyFilter">
        <label for="vacancyFilter" id="ui-label-filter">只顯示有即時空位數據的停車場</label>
    </div>
    
    <div class="action-group">
        <button id="locateBtn" class="main-btn">尋找最近的停車場</button>
        <button id="showFavBtn" class="secondary-btn">顯示我的收藏</button>
    </div>

    <p id="status"></p>
    
    <div id="fav-wrapper" style="display:none;">
        <div class="section-title" id="ui-fav-title">我的收藏夾</div>
        <div id="favoritesList"></div>
    </div>

    <div class="section-title" id="ui-search-title">搜尋結果</div>
    <div id="results"></div>

    <script>
        const i18n = {
            zh_TW: {
                title: "最近的香港停車場",
                btnText: "尋找最近的停車場",
                btnFavShow: "顯示我的收藏",
                btnFavHide: "隱藏我的收藏",
                favTitle: "我的收藏夾",
                searchTitle: "搜尋結果",
                labelLimit: "顯示數量",
                labelSort: "排序方式",
                labelFilter: "只顯示有即時空位數據的停車場",
                gpsLocating: "正在獲取您的位置...",
                apiFetching: "正在讀取停車場數據...",
                gpsError: "定位錯誤: ",
                apiError: "處理數據出錯: ",
                noSupport: "您的瀏覽器不支援地理定位功能。",
                showingResults: "顯示相鄰停車場方案：",
                noRecords: "未找到符合過濾條件的停車場。",
                noFavs: "暫無收藏的停車場。",
                away: "公里外",
                address: "地址",
                district: "地區",
                maxHeight: "最高限高",
                contact: "聯絡電話",
                fees: "收費參考",
                hourly: "每小時",
                liveVacancy: "即時空位",
                spaces: "個空置車位",
                noVacancyData: "未有提供即時空位數據",
                addFav: "收藏",
                removeFav: "取消收藏"
            },
            en_US: {
                title: "Nearest HK Car Parks",
                btnText: "Find Nearest Car Parks",
                btnFavShow: "Show My Favorites",
                btnFavHide: "Hide My Favorites",
                favTitle: "My Favorites",
                searchTitle: "Search Results",
                labelLimit: "Max Results",
                labelSort: "Sort By",
                labelFilter: "Only show entries with live vacancy",
                gpsLocating: "Acquiring location...",
                apiFetching: "Fetching car park data...",
                gpsError: "Location error: ",
                apiError: "Error processing data: ",
                noSupport: "Geolocation is not supported by your browser.",
                showingResults: "Showing nearby car park options:",
                noRecords: "No car parks match your filter options.",
                noFavs: "No favorited car parks yet.",
                away: "km away",
                address: "Address",
                district: "District",
                maxHeight: "Max Height",
                contact: "Contact",
                fees: "Fees Preview",
                hourly: "Hourly",
                liveVacancy: "Live Vacancy",
                spaces: "spaces available",
                noVacancyData: "No live availability data provided",
                addFav: "Favorite",
                removeFav: "Unfavorite"
            }
        };

        let currentLang = 'zh_TW';
        let userCoordinates = null;
        let cachedAllParks = [];
        let favorites = JSON.parse(localStorage.getItem('hk_carpark_favs')) || [];

        const langSelect = document.getElementById('langSelect');
        const limitSelect = document.getElementById('limitSelect');
        const vacancyFilter = document.getElementById('vacancyFilter');
        
        const uiTitle = document.getElementById('ui-title');
        const uiLabelLimit = document.getElementById('ui-label-limit');
        const uiLabelSort = document.getElementById('ui-label-sort');
        const uiLabelFilter = document.getElementById('ui-label-filter');
        
        const locateBtn = document.getElementById('locateBtn');
        const showFavBtn = document.getElementById('showFavBtn');
        const statusText = document.getElementById('status');
        const resultsDiv = document.getElementById('results');
        const favoritesList = document.getElementById('favoritesList');
        const favWrapper = document.getElementById('fav-wrapper');
        const uiFavTitle = document.getElementById('ui-fav-title');
        const uiSearchTitle = document.getElementById('ui-search-title');

        function updateUIStaticText() {
            uiTitle.textContent = i18n[currentLang].title;
            locateBtn.textContent = i18n[currentLang].btnText;
            uiFavTitle.textContent = i18n[currentLang].favTitle;
            uiSearchTitle.textContent = i18n[currentLang].searchTitle;
            uiLabelLimit.textContent = i18n[currentLang].labelLimit;
            uiLabelSort.textContent = i18n[currentLang].labelSort;
            uiLabelFilter.textContent = i18n[currentLang].labelFilter;
            showFavBtn.textContent = favWrapper.style.display === 'none' ? i18n[currentLang].btnFavShow : i18n[currentLang].btnFavHide;
        }

        function filterAndRenderData() {
            if (!userCoordinates || cachedAllParks.length === 0) return;

            let displayList = [...cachedAllParks];

            if (vacancyFilter.checked) {
                displayList = displayList.filter(park => {
                    return park.liveInfo && park.liveInfo.privateCar && park.liveInfo.privateCar.length > 0 && park.liveInfo.privateCar[0].vacancy !== undefined && park.liveInfo.privateCar[0].vacancy !== null;
                });
            }

            const maxLimit = parseInt(limitSelect.value) || 30;
            const finalSelection = displayList.slice(0, maxLimit);

            displayResults(finalSelection);
        }

        langSelect.addEventListener('change', (e) => {
            currentLang = e.target.value;
            updateUIStaticText();
            if (userCoordinates) {
                statusText.textContent = i18n[currentLang].apiFetching;
                fetchCarParks(userCoordinates.lat, userCoordinates.lng);
            } else if (cachedAllParks.length > 0) {
                renderFavorites();
            }
        });

        limitSelect.addEventListener('change', filterAndRenderData);
        vacancyFilter.addEventListener('change', filterAndRenderData);

        showFavBtn.addEventListener('click', () => {
            if (favWrapper.style.display === 'none') {
                favWrapper.style.display = 'block';
                if (cachedAllParks.length === 0) {
                    silentFetchData();
                } else {
                    renderFavorites();
                }
            } else {
                favWrapper.style.display = 'none';
            }
            updateUIStaticText();
        });

        function toggleFavorite(id) {
            if (favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('hk_carpark_favs', JSON.stringify(favorites));
            
            renderFavorites();
            filterAndRenderData();
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        locateBtn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                statusText.textContent = i18n[currentLang].noSupport;
                return;
            }
            locateBtn.disabled = true;
            statusText.textContent = i18n[currentLang].gpsLocating;
            resultsDiv.innerHTML = "";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userCoordinates = { lat: position.coords.latitude, lng: position.coords.longitude };
                    statusText.textContent = i18n[currentLang].apiFetching;
                    fetchCarParks(userCoordinates.lat, userCoordinates.lng);
                },
                (error) => {
                    locateBtn.disabled = false;
                    statusText.textContent = `${i18n[currentLang].gpsError}${error.message}`;
                },
                { enableHighAccuracy: true }
            );
        });

        async function silentFetchData() {
            try {
                const infoUrl = `https://api.data.gov.hk/v1/carpark-info-vacancy?data=info&lang=${currentLang}`;
                const vacancyUrl = `https://api.data.gov.hk/v1/carpark-info-vacancy?data=vacancy&lang=${currentLang}`;
                const [infoRes, vacancyRes] = await Promise.all([fetch(infoUrl), fetch(vacancyUrl)]);
                if (infoRes.ok && vacancyRes.ok) {
                    const infoData = await infoRes.json();
                    const vacancyData = await vacancyRes.json();
                    buildCache(infoData.results || [], vacancyData.results || [], null);
                    renderFavorites();
                }
            } catch (e) {}
        }

        async function fetchCarParks(userLat, userLng) {
            try {
                const infoUrl = `https://api.data.gov.hk/v1/carpark-info-vacancy?data=info&lang=${currentLang}`;
                const vacancyUrl = `https://api.data.gov.hk/v1/carpark-info-vacancy?data=vacancy&lang=${currentLang}`;

                const [infoRes, vacancyRes] = await Promise.all([fetch(infoUrl), fetch(vacancyUrl)]);
                if (!infoRes.ok || !vacancyRes.ok) throw new Error("API network failure");
                
                const infoData = await infoRes.json();
                const vacancyData = await vacancyRes.json();

                buildCache(infoData.results || [], vacancyData.results || [], { lat: userLat, lng: userLng });
                filterAndRenderData();
                renderFavorites();
            } catch (err) {
                statusText.textContent = `${i18n[currentLang].apiError}${err.message}`;
            } finally {
                locateBtn.disabled = false;
            }
        }

        function buildCache(infoArray, vacancyArray, coords) {
            const vacancyMap = new Map();
            vacancyArray.forEach(v => vacancyMap.set(v.park_Id, v));

            cachedAllParks = infoArray.map(park => {
                let distance = Infinity;
                if (coords) {
                    distance = calculateDistance(coords.lat, coords.lng, park.latitude, park.longitude);
                }
                const liveInfo = vacancyMap.get(park.park_Id);
                return { ...park, distance, liveInfo };
            });

            if (coords) {
                cachedAllParks.sort((a, b) => a.distance - b.distance);
            }
        }

        function generateCardHTML(park) {
            const t = i18n[currentLang];
            const isFav = favorites.includes(park.park_Id);
            
            let displayAddress = '';
            if (park.displayAddress) displayAddress = park.displayAddress;
            else if (park.address) displayAddress = typeof park.address === 'string' ? park.address : (park.address.displayAddress || '');

            const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(displayAddress + " " + (park.name || ''))}`;

            let heightText = '';
            if (park.heightRestrictions && park.heightRestrictions.length > 0) {
                heightText = park.heightRestrictions.map(h => h.height ? `${h.height}m` : '').filter(Boolean).join(', ');
            }

            let feeText = '';
            let feesArray = park.parkingFees || park.parkingFee || park.prices || [];
            if (feesArray && feesArray.length > 0) {
                feeText = feesArray.slice(0, 2).map(f => {
                    const typeRaw = f.chargingType || f.type || '';
                    const type = typeRaw === 'Hourly' ? t.hourly : typeRaw;
                    const amt = f.fee !== undefined ? f.fee : (f.price !== undefined ? f.price : '');
                    const day = f.dayType || '';
                    if (!amt) return '';
                    return `${day ? day + ' ' : ''}${type}: HK$${amt}`;
                }).filter(Boolean).join(' | ');
            }

            let vacancyHTML = `<div class="vacancy-box">[!] ${t.noVacancyData}</div>`;
            if (park.liveInfo && park.liveInfo.privateCar && park.liveInfo.privateCar.length > 0) {
                const count = park.liveInfo.privateCar[0].vacancy;
                if (count !== undefined && count !== null && count >= 0) {
                    const isZero = count === 0;
                    vacancyHTML = `
                        <div class="vacancy-box ${isZero ? 'full' : 'available'}">
                            <strong>${t.liveVacancy}:</strong> 
                            <span class="vacancy-num ${isZero ? 'none' : ''}">${count}</span> ${t.spaces}
                        </div>`;
                }
            }

            let contactHTML = '';
            if (park.contactNo) {
                const cleanPhone = park.contactNo.replace(/\s+/g, '');
                contactHTML = `<a href="tel:${cleanPhone}" class="phone-link">${park.contactNo}</a>`;
            }

            const distHTML = park.distance !== Infinity ? `<span class="distance">${park.distance.toFixed(2)} ${t.away}</span>` : '';
            const favBtnText = isFav ? t.removeFav : t.addFav;

            let infoGridItems = '';
            if (displayAddress) {
                infoGridItems += `<div class="info-label">${t.address}:</div><div><a href="${mapUrl}" target="_blank" class="map-link">${displayAddress}</a></div>`;
            }
            if (park.district) {
                infoGridItems += `<div class="info-label">${t.district}:</div><div>${park.district}</div>`;
            }
            if (park.carpark_Type) {
                infoGridItems += `<div class="info-label">${currentLang === 'zh_TW' ? '類型' : 'Type'}:</div><div>${park.carpark_Type}</div>`;
            }
            if (heightText) {
                infoGridItems += `<div class="info-label">${t.maxHeight}:</div><div>${heightText}</div>`;
            }
            if (contactHTML) {
                infoGridItems += `<div class="info-label">${t.contact}:</div><div>${contactHTML}</div>`;
            }

            let feeBoxHTML = '';
            if (feeText) {
                feeBoxHTML = `
                    <div class="fee-box">
                        <strong>${t.fees}:</strong> ${feeText}
                    </div>`;
            }

            return `
                <div class="carpark-card">
                    <div class="card-header">
                        <div class="carpark-name">${park.name || '---'}</div>
                        <button class="card-fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${park.park_Id}')">${favBtnText}</button>
                    </div>
                    <div class="tags-row">
                        <span class="badge ${park.nature === 'government' ? 'government' : 'commercial'}">${park.nature || '---'}</span>
                        ${distHTML}
                    </div>
                    
                    ${infoGridItems ? `<div class="info-grid">${infoGridItems}</div>` : ''}
                    ${vacancyHTML}
                    ${feeBoxHTML}
                </div>
            `;
        }

        function displayResults(parks) {
            statusText.textContent = i18n[currentLang].showingResults;
            if (parks.length === 0) {
                resultsDiv.innerHTML = `<div class="empty-notice">${i18n[currentLang].noRecords}</div>`;
                return;
            }
            resultsDiv.innerHTML = parks.map(park => generateCardHTML(park)).join('');
        }

        function renderFavorites() {
            if (favorites.length === 0) {
                favoritesList.innerHTML = `<div class="empty-notice">${i18n[currentLang].noFavs}</div>`;
                return;
            }
            const favParks = cachedAllParks.filter(park => favorites.includes(park.park_Id));
            favoritesList.innerHTML = favParks.map(park => generateCardHTML(park)).join('');
        }

        updateUIStaticText();
    </script>
</body>
</html>
