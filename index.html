<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Car Parks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header-container">
        <h1 id="ui-title">最近的香港停車場</h1>
        <select id="langSelect">
            <option value="zh_TW" selected>繁體中文</option>
            <option value="en_US">English</option>
        </select>
    </div>

    <div class="tab-container">
        <button id="tabOffStreet" class="tab-btn active" onclick="switchTab('offstreet')">室內停車場</button>
        <button id="tabMetered" class="tab-btn" onclick="switchTab('metered')">路邊咪錶位</button>
    </div>
    
    <div class="action-group">
        <button id="locateBtn" class="main-btn">使用當前 GPS 位置尋找</button>
        <button id="showFavBtn" class="secondary-btn">顯示我的收藏</button>
    </div>

    <div class="search-bar-container">
        <input type="text" id="searchInput" placeholder="搜尋香港地址、大廈、商場或街道...">
        <button id="searchBtn" class="search-action-btn">搜尋</button>
    </div>

    <p id="status"></p>
    <p id="countdownText"></p>
    
    <div id="fav-wrapper" style="display:none;">
        <div class="section-title" id="ui-fav-title">我的收藏夾</div>
        <div id="favoritesList"></div>
    </div>

    <div id="filter-container" style="display: none;">
        <button id="pill-all" class="pill-btn active" onclick="setMeterFilter('all')">全部</button>
        <button id="pill-vacant" class="pill-btn" onclick="setMeterFilter('vacant')">僅顯示空置</button>
        <button id="pill-occupied" class="pill-btn" onclick="setMeterFilter('occupied')">僅顯示使用中</button>
    </div>

    <div class="section-title" id="ui-search-title">搜尋結果</div>
    <div id="results"></div>

    <script src="app.js"></script>
</body>
</html>
