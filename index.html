<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receiptly • Smart HK Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .receipt-preview { max-height: 360px; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-xl mx-auto">
    <header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50 px-6 py-5">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-xl font-bold">R</div>
          <div>
            <h1 class="text-2xl font-semibold tracking-tight">Receiptly</h1>
            <p class="text-xs text-emerald-400 -mt-1">OCR.space Fixed</p>
          </div>
        </div>
      </div>
    </header>

    <div class="px-6 pt-6 pb-24">
      <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="bg-zinc-900 rounded-3xl p-5">
          <div class="text-zinc-400 text-sm">This Month</div>
          <div id="monthly-total" class="text-4xl font-semibold mt-2 text-emerald-400">$0.00</div>
        </div>
        <div class="bg-zinc-900 rounded-3xl p-5">
          <div class="text-zinc-400 text-sm">Total Expenses</div>
          <div id="total-expenses" class="text-4xl font-semibold mt-2">$0.00</div>
        </div>
      </div>

      <div class="flex border-b border-zinc-800 mb-6">
        <button onclick="switchTab(0)" id="tab-0" class="tab-btn flex-1 py-4 text-center font-medium border-b-2 border-emerald-500 text-emerald-400">History</button>
        <button onclick="switchTab(1)" id="tab-1" class="tab-btn flex-1 py-4 text-center font-medium text-zinc-400">Monthly</button>
      </div>

      <div id="history-tab">
        <div id="expense-list" class="space-y-3"></div>
      </div>

      <div id="monthly-tab" class="hidden">
        <div id="monthly-list" class="space-y-4"></div>
      </div>
    </div>

    <div onclick="showAddModal()" class="fixed bottom-8 right-8 w-16 h-16 bg-emerald-500 hover:bg-emerald-600 rounded-3xl flex items-center justify-center shadow-2xl text-3xl active:scale-95 transition-all z-50">
      <i class="fa-solid fa-camera"></i>
    </div>
  </div>

  <!-- Modal -->
  <div id="add-modal" class="hidden fixed inset-0 bg-black/80 flex items-end z-[100]">
    <div class="bg-zinc-900 w-full rounded-t-3xl max-h-[92vh] overflow-auto">
      <div class="px-6 py-6">
        <div class="flex justify-between items-center mb-6">
          <h2 id="modal-title" class="text-2xl font-semibold">New Expense</h2>
          <button onclick="hideAddModal()" class="text-zinc-400 text-3xl">✕</button>
        </div>

        <div id="upload-area" class="border-2 border-dashed border-zinc-700 hover:border-emerald-500 rounded-3xl h-64 flex flex-col items-center justify-center cursor-pointer mb-6" onclick="document.getElementById('receipt-upload').click()">
          <input type="file" id="receipt-upload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
          <i class="fa-solid fa-camera text-5xl mb-4 text-emerald-500"></i>
          <p class="font-medium">Upload Receipt Photo</p>
          <p class="text-xs text-zinc-500">OCR.space will detect amount, date, merchant</p>
        </div>

        <div id="preview-area" class="hidden mb-6">
          <img id="receipt-preview" class="w-full rounded-3xl receipt-preview object-contain bg-zinc-950">
          <button onclick="removeImage()" class="mt-3 text-red-400 text-sm flex items-center gap-2">
            <i class="fa-solid fa-trash"></i> Remove Photo
          </button>
        </div>

        <div class="space-y-5">
          <div>
            <label class="block text-zinc-400 text-sm mb-2">Date</label>
            <input id="expense-date" type="date" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
          </div>
          <div>
            <label class="block text-zinc-400 text-sm mb-2">Merchant</label>
            <input id="expense-merchant" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4">
          </div>
          <div>
            <label class="block text-zinc-400 text-sm mb-2">Amount (HKD)</label>
            <div class="relative">
              <span class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400">$</span>
              <input id="expense-amount" type="number" step="0.01" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-12 py-4 text-lg">
            </div>
          </div>

          <div class="pt-4 flex gap-3">
            <button onclick="hideAddModal()" class="flex-1 py-5 rounded-3xl border border-zinc-700">Cancel</button>
            <button onclick="saveExpense()" class="flex-1 bg-emerald-500 py-5 rounded-3xl font-semibold">Save Expense</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const OCR_API_KEY = "K81043441588957";

    let expenses = JSON.parse(localStorage.getItem('receiptly_expenses')) || [];
    let editingId = null;
    let currentImage = null;

    function saveToLocal() { localStorage.setItem('receiptly_expenses', JSON.stringify(expenses)); }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    async function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async (ev) => {
        currentImage = ev.target.result;
        document.getElementById('upload-area').classList.add('hidden');
        document.getElementById('preview-area').classList.remove('hidden');
        document.getElementById('receipt-preview').src = currentImage;

        await runOCR(currentImage);
      };
      reader.readAsDataURL(file);
    }

    async function runOCR(imageDataUrl) {
      const loading = document.createElement('div');
      loading.className = "text-center text-emerald-400 mt-4";
      loading.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Processing with OCR.space...`;
      document.getElementById('preview-area').appendChild(loading);

      try {
        const base64 = imageDataUrl.split(',')[1];

        const formData = new FormData();
        formData.append('base64Image', `data:image/jpeg;base64,${base64}`);
        formData.append('language', 'chi_tra+eng');
        formData.append('isTable', 'true');
        formData.append('OCREngine', '2');
        formData.append('scale', 'true');
        formData.append('detectOrientation', 'true');

        const response = await fetch('https://api.ocr.space/parse/image', {
          method: 'POST',
          headers: { 'apikey': OCR_API_KEY },
          body: formData
        });

        const data = await response.json();

        if (data.IsErroredOnProcessing) {
          console.error(data);
          alert("OCR Error: " + (data.ErrorMessage ? data.ErrorMessage[0] : "Unknown error"));
          return;
        }

        const rawText = data.ParsedResults[0].ParsedText || "";
        console.log("Raw OCR Output:", rawText);

        // Improved extraction
        let amount = null;
        const totalMatch = rawText.match(/總金額[：\s]*\$?([\d,]+\.?\d*)/i);
        if (totalMatch) {
          amount = parseFloat(totalMatch[1].replace(/,/g, ''));
        } else {
          const amounts = rawText.match(/\$?(\d{1,3}(?:,\d{3})*(?:\.\d{2})?)/g);
          if (amounts) {
            let max = 0;
            amounts.forEach(a => {
              const num = parseFloat(a.replace(/[$,]/g, ''));
              if (num > max && num < 100000) max = num;
            });
            amount = max;
          }
        }

        const dateMatch = rawText.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
        let date = new Date().toISOString().split('T')[0];
        if (dateMatch) {
          date = `${dateMatch[1]}-${dateMatch[2].padStart(2,'0')}-${dateMatch[3].padStart(2,'0')}`;
        }

        const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 5);
        let merchant = lines[0] || "Restaurant";

        document.getElementById('expense-merchant').value = merchant;
        if (amount) document.getElementById('expense-amount').value = amount.toFixed(2);
        document.getElementById('expense-date').value = date;

      } catch (err) {
        console.error(err);
        alert("Failed to connect to OCR service. Please fill manually.");
      } finally {
        loading.remove();
      }
    }

    function removeImage() {
      currentImage = null;
      document.getElementById('preview-area').classList.add('hidden');
      document.getElementById('upload-area').classList.remove('hidden');
    }

    function showAddModal() {
      editingId = null;
      document.getElementById('modal-title').textContent = "New Expense";
      document.getElementById('add-modal').classList.remove('hidden');
      document.getElementById('preview-area').classList.add('hidden');
      document.getElementById('upload-area').classList.remove('hidden');
      document.getElementById('expense-date').value = new Date().toISOString().split('T')[0];
    }

    function hideAddModal() {
      document.getElementById('add-modal').classList.add('hidden');
    }

    function saveExpense() {
      const merchant = document.getElementById('expense-merchant').value.trim();
      const amount = parseFloat(document.getElementById('expense-amount').value);
      const date = document.getElementById('expense-date').value;
      const category = document.getElementById('expense-category') ? document.getElementById('expense-category').value : 'Food';

      if (!merchant || isNaN(amount) || !date) {
        alert("Please fill in all fields");
        return;
      }

      expenses.push({
        id: Date.now(),
        date,
        merchant,
        amount,
        category,
        image: currentImage
      });

      saveToLocal();
      renderHistory();
      calculateMonthlyTotal();
      renderMonthly();
      hideAddModal();
    }

    // Render functions (same as before)
    function renderHistory() { /* ... same as previous working version ... */ 
      const container = document.getElementById('expense-list');
      container.innerHTML = '';
      if (expenses.length === 0) {
        container.innerHTML = `<div class="text-center py-20 text-zinc-500">No expenses yet</div>`;
        return;
      }
      expenses.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(exp => {
        const div = document.createElement('div');
        div.className = 'bg-zinc-900 rounded-3xl p-5';
        div.innerHTML = `
          <div class="flex gap-4">
            <div class="text-3xl">🍽️</div>
            <div class="flex-1">
              <div class="flex justify-between">
                <div>
                  <div class="font-semibold">${exp.merchant}</div>
                  <div class="text-xs text-zinc-500">${formatDate(exp.date)}</div>
                </div>
                <div class="text-xl font-semibold">$${parseFloat(exp.amount).toFixed(2)}</div>
              </div>
            </div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function calculateMonthlyTotal() {
      const now = new Date();
      let month = 0, total = 0;
      expenses.forEach(exp => {
        total += parseFloat(exp.amount);
        const d = new Date(exp.date);
        if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) month += parseFloat(exp.amount);
      });
      document.getElementById('monthly-total').textContent = '$' + month.toFixed(2);
      document.getElementById('total-expenses').textContent = '$' + total.toFixed(2);
    }

    function renderMonthly() { /* minimal */ }

    function switchTab(n) {
      document.getElementById('history-tab').classList.toggle('hidden', n !== 0);
      document.getElementById('monthly-tab').classList.toggle('hidden', n !== 1);
    }

    window.onload = () => {
      renderHistory();
      calculateMonthlyTotal();
      switchTab(0);
    };
  </script>
</body>
</html>
