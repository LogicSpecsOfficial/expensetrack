<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK Nearby Bus Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased select-none">

    <!-- Mobile Header -->
    <header class="sticky top-0 z-50 bg-white border-b border-slate-100 px-4 py-3 shadow-sm">
        <div class="flex items-center justify-between">
            <h1 class="text-lg font-bold tracking-tight text-slate-900">HK Bus NearMe</h1>
            <span id="gps-status" class="text-xs font-medium px-2.5 py-1 rounded-full bg-amber-50 text-amber-700 border border-amber-200">
                Awaiting GPS...
            </span>
        </div>
        
        <!-- Controls Panel -->
        <div class="mt-3 space-y-2">
            <div class="flex items-center justify-between text-xs text-slate-500 font-medium">
                <span>Search Radius: <span id="radius-val" class="text-slate-900 font-bold">400</span>m</span>
                <button id="btn-refresh" class="text-blue-600 font-semibold active:text-blue-800" onclick="initiateLocationSearch()">
                    🔄 Rescan Area
                </button>
            </div>
            <input type="range" id="radius-slider" min="200" max="1000" step="50" value="400" 
                   class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
        </div>
    </header>

    <!-- Main Content Area Container -->
    <main class="p-4 max-w-md mx-auto pb-24">
        <!-- Live Loading Status Display -->
        <div id="loader" class="hidden text-center py-8">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-slate-200 border-t-blue-600 mb-2"></div>
            <p class="text-sm text-slate-500" id="loader-text">Locating device...</p>
        </div>

        <!-- System Message Box -->
        <div id="error-box" class="hidden bg-red-50 border border-red-200 text-red-700 p-3 rounded-xl text-sm mb-4"></div>

        <!-- Combined Stops Stream -->
        <div id="stops-container" class="space-y-4">
            <!-- Dynamic stop cards injection point -->
        </div>
    </main>

    <!-- Bottom Route Filter and Tracker Sheet -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 px-4 py-3 shadow-xl max-w-md mx-auto">
        <div class="flex gap-2">
            <input type="text" id="search-route" placeholder="Enter bus number (e.g., 104, 968)" 
                   class="flex-1 bg-slate-100 border-none rounded-xl px-4 py-2.5 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 uppercase">
            <button onclick="handleRouteSearch()" class="bg-slate-900 text-white font-bold text-sm px-5 py-2.5 rounded-xl active:bg-slate-800 transition-colors">
                Track Route
            </button>
        </div>
    </footer>

    <!-- Core Application Script Logic -->
    <script>
        // Sample Compressed Static Stop Register Mini-DB (Subset for testing)
        // Production note: Generate complete JSON mappings into this variable directly via your pipeline.
        const STATIC_STOPS_DATABASE = [
            { id: "001302", nameEN: "Cross Harbour Tunnel Toll Plaza", nameZH: "紅磡海底隧道轉車站", lat: 22.3029, lon: 114.1818, comp: "KMB" },
            { id: "001302", nameEN: "Cross Harbour Tunnel Toll Plaza", nameZH: "紅磡海底隧道轉車站", lat: 22.3029, lon: 114.1818, comp: "CTB" },
            { id: "96A8A47936E39062", nameEN: "Western Harbour Crossing Toll Plaza", nameZH: "西區海底隧道轉車站", lat: 22.3056, lon: 114.1598, comp: "KMB" },
            { id: "001150", nameEN: "Western Harbour Crossing Toll Plaza", nameZH: "西區海底隧道轉車站", lat: 22.3058, lon: 114.1599, comp: "CTB" },
            { id: "9378C7DFD99B9CCB", nameEN: "Shatin Station B/T", nameZH: "沙田站總站", lat: 22.3831, lon: 114.1868, comp: "KMB" },
            { id: "002621", nameEN: "Tsim Sha Tsui Star Ferry Pier", nameZH: "尖沙咀碼頭", lat: 22.2938, lon: 114.1687, comp: "KMB" },
            { id: "001002", nameEN: "Central Ferry Pier 3", nameZH: "中環3號碼頭", lat: 22.2872, lon: 114.1578, comp: "CTB" }
        ];

        let currentLatitude = null;
        let currentLongitude = null;

        // UI Event Listeners
        document.getElementById('radius-slider').addEventListener('input', (e) => {
            document.getElementById('radius-val').innerText = e.target.value;
            if (currentLatitude && currentLongitude) {
                renderNearbyStops(currentLatitude, currentLongitude, parseInt(e.target.value));
            }
        });

        // Initialize Application Context
        window.addEventListener('DOMContentLoaded', () => {
            initiateLocationSearch();
        });

        function showLoader(text) {
            const loader = document.getElementById('loader');
            document.getElementById('loader-text').innerText = text;
            loader.classList.remove('hidden');
        }

        function hideLoader() {
            document.getElementById('loader').classList.add('hidden');
        }

        function showError(msg) {
            const errBox = document.getElementById('error-box');
            errBox.innerText = msg;
            errBox.classList.remove('hidden');
            setTimeout(() => errBox.classList.add('hidden'), 6000);
        }

        // Geospatial Device Interrogation
        function initiateLocationSearch() {
            showLoader("Requesting GPS coordinates...");
            document.getElementById('stops-container').innerHTML = '';
            
            if (!navigator.geolocation) {
                hideLoader();
                showError("Geolocation protocol missing from browser profile.");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    currentLatitude = position.coords.latitude;
                    currentLongitude = position.coords.longitude;
                    
                    document.getElementById('gps-status').className = "text-xs font-medium px-2.5 py-1 rounded-full bg-green-50 text-green-700 border border-green-200";
                    document.getElementById('gps-status').innerText = "GPS Fixed";
                    
                    const selectedRadius = parseInt(document.getElementById('radius-slider').value);
                    renderNearbyStops(currentLatitude, currentLongitude, selectedRadius);
                },
                (error) => {
                    hideLoader();
                    document.getElementById('gps-status').className = "text-xs font-medium px-2.5 py-1 rounded-full bg-red-50 text-red-700 border border-red-200";
                    document.getElementById('gps-status').innerText = "GPS Error";
                    showError("Unable to fix location. Using fallback mock location data for preview.");
                    // Fallback development coordinates (HK Cross Harbour Tunnel Coordinates) for layout previewing
                    currentLatitude = 22.3029;
                    currentLongitude = 114.1818;
                    renderNearbyStops(currentLatitude, currentLongitude, parseInt(document.getElementById('radius-slider').value));
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        // Haversine Formula for Distance Calculation
        function calculateHaversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Earth radius in meters
            const phi1 = lat1 * Math.PI / 180;
            const phi2 = lat2 * Math.PI / 180;
            const deltaPhi = (lat2 - lat1) * Math.PI / 180;
            const deltaLambda = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) +
                      Math.cos(phi1) * Math.cos(phi2) *
                      Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c; 
        }

        // Spatial Scan and Node Consolidation
        function renderNearbyStops(userLat, userLon, maxRadiusMeters) {
            showLoader("Scanning area metrics...");
            const container = document.getElementById('stops-container');
            container.innerHTML = '';

            // Map and calculate distances
            let validStops = STATIC_STOPS_DATABASE.map(stop => {
                const distance = calculateHaversineDistance(userLat, userLon, stop.lat, stop.lon);
                return { ...stop, distance: Math.round(distance) };
            }).filter(stop => stop.distance <= maxRadiusMeters);

            // Sort by proximity
            validStops.sort((a, b) => a.distance - b.distance);

            // Condense / Combine identical stop names into unified stations
            let combinedMap = new Map();
            validStops.forEach(stop => {
                const key = stop.nameZH;
                if (!combinedMap.has(key)) {
                    combinedMap.set(key, {
                        nameZH: stop.nameZH,
                        nameEN: stop.nameEN,
                        distance: stop.distance,
                        subStops: []
                    });
                }
                combinedMap.get(key).subStops.push({ id: stop.id, company: stop.comp });
            });

            if (combinedMap.size === 0) {
                container.innerHTML = `<div class="text-center text-sm text-slate-400 py-12">No public transit stops found within ${maxRadiusMeters}m radius.</div>`;
                hideLoader();
                return;
            }

            // Create UI Cards
            combinedMap.forEach((station, key) => {
                const cardId = `station-${btoa(encodeURIComponent(station.nameZH)).replace(/=/g, '')}`;
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl border border-slate-100 p-4 shadow-sm space-y-3 transition-all";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h2 class="font-bold text-base text-slate-900">${station.nameZH}</h2>
                            <p class="text-xs text-slate-400 font-medium">${station.nameEN}</p>
                        </div>
                        <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">
                            ${station.distance}m
                        </span>
                    </div>
                    <div id="eta-box-${cardId}" class="space-y-1.5 pt-1">
                        <button onclick="fetchStationETAs('${cardId}', ${JSON.stringify(station.subStops).replace(/"/g, '&quot;')})" 
                                class="w-full text-center text-xs font-bold py-2 bg-slate-50 hover:bg-slate-100 text-slate-600 rounded-xl border border-slate-200 transition-colors">
                            ⚡ Load Realtime Arrivals
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });

            hideLoader();
        }

        // Live API Dispatcher for Mixed Operator ETAs
        async function fetchStationETAs(cardId, subStops) {
            const targetBox = document.getElementById(`eta-box-${cardId}`);
            targetBox.innerHTML = `<div class="text-center py-2 text-xs text-slate-400 animate-pulse">Querying live feeds...</div>`;

            let fetchPromises = subStops.map(sub => {
                if (sub.company === "KMB") {
                    return fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${sub.id}`)
                        .then(res => res.json())
                        .then(json => (json.data || []).map(item => ({
                            route: item.route,
                            dest: item.dest_zh,
                            eta: item.eta,
                            co: "KMB",
                            seq: item.eta_seq
                        })))
                        .catch(() => []);
                } else if (sub.company === "CTB") {
                    return fetch(`https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${sub.id}/ALL`)
                        .then(res => res.json())
                        .then(json => (json.data || []).map(item => ({
                            route: item.route,
                            dest: item.dest_zh,
                            eta: item.eta,
                            co: "CTB",
                            seq: item.eta_seq
                        })))
                        .catch(() => []);
                }
                return Promise.resolve([]);
            });

            try {
                const resultsArray = await Promise.all(fetchPromises);
                let unifiedETAs = [].concat(...resultsArray);

                // Filter out records missing exact time declarations, and filter to next 2 variations per route
                const now = new Date();
                unifiedETAs = unifiedETAs.filter(item => item.eta && new Date(item.eta) > now && item.seq <= 2);

                // Sort chronological
                unifiedETAs.sort((a, b) => new Date(a.eta) - new Date(b.eta));

                if (unifiedETAs.length === 0) {
                    targetBox.innerHTML = `<p class="text-xs text-slate-400 text-center py-1">No scheduled routes found in next 60m.</p>`;
                    return;
                }

                targetBox.innerHTML = '';
                unifiedETAs.slice(0, 8).forEach(item => {
                    const diffMinutes = Math.max(0, Math.round((new Date(item.eta) - new Date()) / 60000));
                    const coColor = item.co === "KMB" ? "bg-red-500" : "bg-yellow-400 text-slate-900";
                    
                    const row = document.createElement('div');
                    row.className = "flex items-center justify-between bg-slate-50 p-2 rounded-xl border border-slate-100";
                    row.innerHTML = `
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-black px-1.5 py-0.5 rounded ${coColor} text-white min-w-[36px] text-center">
                                ${item.route}
                            </span>
                            <span class="text-xs font-bold text-slate-700 truncate max-w-[140px]">往 ${item.dest}</span>
                        </div>
                        <span class="text-xs font-black ${diffMinutes <= 3 ? 'text-green-600 animate-pulse' : 'text-slate-900'}">
                            ${diffMinutes} min
                        </span>
                    `;
                    targetBox.appendChild(row);
                });

            } catch (err) {
                targetBox.innerHTML = `<p class="text-xs text-red-500 text-center py-1">Failed to gather feeds.</p>`;
            }
        }

        // Secondary Global Feature Tracker for Specific Line Inquiries
        function handleRouteSearch() {
            const rawRoute = document.getElementById('search-route').value.trim().toUpperCase();
            if (!rawRoute) return;

            showLoader(`Tracking route ${rawRoute} networks...`);
            const container = document.getElementById('stops-container');
            container.innerHTML = '';

            // Search matches inside our local dictionary
            // In a production asset, you can fetch KMB/CTB route-stops endpoints live here.
            container.innerHTML = `
                <div class="bg-slate-900 text-white rounded-2xl p-4 mb-4">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Active Monitoring</p>
                    <h3 class="text-xl font-black">Route ${rawRoute}</h3>
                    <p class="text-xs text-slate-300 mt-1">Displaying localized alignment references from data directory...</p>
                </div>
                <div class="text-center py-6 text-sm text-slate-500">
                    Route layout processing established. Expand static stop register definitions to trace linear trajectories.
                </div>
            `;
            hideLoader();
        }
    </script>
</body>
</html>
