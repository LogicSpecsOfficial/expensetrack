<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Car Parks</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 僅針對路邊咪錶位卡片進行版面壓縮與右側重組 */
        .carpark-card.meter-card {
            position: relative !important;
            padding: 12px 110px 12px 12px !important;
            min-height: 105px !important;
            box-sizing: border-box !important;
        }

        /* 允許右側元件獨立進行絕對定位 */
        .carpark-card.meter-card .card-body-split {
            display: block !important;
        }

        .carpark-card.meter-card .card-right {
            position: static !important;
        }

        /* 將路邊咪錶的空置率盒子固定於右上角 */
        .carpark-card.meter-card .vacancy-badge {
            position: absolute !important;
            top: 12px !important;
            right: 12px !important;
            margin: 0 !important;
            width: 84px !important;
            box-sizing: border-box !important;
        }

        /* 將無邊框按鈕群水平排列並與空置率盒子右側對齊 */
        .carpark-card.meter-card .parking-tracker-btn-container {
            position: absolute !important;
            right: 12px !important;
            top: 62px !important; 
            display: flex !important;
            gap: 8px !important;
            width: 84px !important;
            justify-content: flex-end !important;
            background: transparent !important;
            margin: 0 !important;
            padding: 0 !important;
            z-index: 10 !important;
        }

        /* 純透明無邊框功能按鈕樣式 */
        .parking-action-btn {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            width: 36px !important;
            height: 36px !important;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            color: #94a3b8 !important;
            cursor: pointer !important;
            transition: color 0.2s ease-in-out !important;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
            padding: 0 !important;
            box-sizing: border-box !important;
        }

        .parking-action-btn:active {
            opacity: 0.5 !important;
        }

        .parking-tracker-toggle-btn {
            color: #94a3b8 !important;
        }

        /* 啟動追蹤時轉為純亮藍色 */
        .parking-tracker-toggle-btn.tracking-active {
            color: #2563eb !important;
        }

        .parking-tracker-toggle-btn.tracking-disabled {
            color: #94a3b8 !important;
            opacity: 0.15 !important;
            cursor: not-allowed !important;
        }

        /* 頂部輕量化提示通知 */
        #parking-toast-notice {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1e293b;
            color: #f8fafc;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            z-index: 1000000;
            width: calc(100% - 32px);
            max-width: 360px;
            text-align: center;
            animation: toastFadeIn 0.3s ease-out;
            transition: opacity 0.3s ease;
        }

        /* 底部智慧狀態島 */
        #mobile-bottom-tracker-island {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            background-color: #1e293b;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4), 0 8px 10px -6px rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 12px 16px;
            z-index: 99999;
            box-sizing: border-box;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
            animation: islandSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #mobile-bottom-tracker-island.island-hidden {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        .island-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 6px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .island-pulse {
            width: 6px;
            height: 6px;
            background-color: #3b82f6;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.6);
            animation: islandPulseGlow 2s infinite;
        }

        .island-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-top: 1px solid #334155;
        }

        .island-row:first-of-type {
            border-top: none;
        }

        .island-carpark-name {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 75%;
            color: #f1f5f9;
        }

        .island-cancel-btn {
            background-color: #334155;
            border: none;
            color: #f8fafc;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes toastFadeIn {
            from { top: 0; opacity: 0; }
            to { top: 24px; opacity: 1; }
        }

        @keyframes islandSlideUp {
            from { transform: translate(-50%, 80px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        @keyframes islandPulseGlow {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.6); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body>

    <div class="sticky-header-wrapper">
        <div class="header-container">
            <button id="homeBtn" class="icon-btn" aria-label="主頁"></button>
            <div class="header-actions">
                <button id="themeToggleBtn" class="icon-btn" onclick="toggleTheme()" aria-label="切換主題"></button>
                <button id="showFavBtn" class="icon-btn" aria-label="我的收藏"></button>
                <button id="searchToggleBtn" class="icon-btn" aria-label="展開搜尋"></button>
                <button id="refreshBtn" class="icon-btn" aria-label="更新數據"></button>
                <button id="locateBtn" class="icon-btn" aria-label="GPS 定位"></button>
            </div>
        </div>

        <div class="tab-container">
            <button id="tabOffStreet" class="tab-btn active" onclick="switchTab('offstreet')">室內停車場</button>
            <button id="tabMetered" class="tab-btn" onclick="switchTab('metered')">路邊咪錶位</button>
            <button id="tabToilet" class="tab-btn" onclick="switchTab('toilet')">公廁</button>
        </div>
        
        <div id="searchWrapper" class="search-dropdown">
            <div class="search-bar-container">
                <input type="text" id="searchInput" placeholder="搜尋香港地址、大廈、商場或街道...">
                <button id="searchBtn" class="search-action-btn">搜尋</button>
            </div>
        </div>

        <div id="history-wrapper" class="history-container" style="display: none;">
            <div id="historyChips" class="chips-row"></div>
            <button id="clearHistoryBtn" class="clear-btn">清除</button>
        </div>
    </div>

    <p id="status"></p>
    
    <div id="fav-wrapper" style="display:none;">
        <div class="section-title" id="ui-fav-title">我的收藏夾</div>
        <div id="favoritesList"></div>
    </div>

    <div id="filter-container" style="display: none;"></div>

    <div class="section-title" id="ui-search-title">搜尋結果</div>
    <div id="searchSubtitle" class="search-subtitle" style="display: none;"></div>
    <div id="results"></div>

    <button id="backToTopBtn" class="back-to-top" aria-label="回到頂部"></button>
    
    <script src="config.js"></script>
    <script src="templates.js"></script>
    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="map.js"></script>
    <script src="parkingTracker.js"></script>
    <script src="app.js"></script>

</body>
</html>
