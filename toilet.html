<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEHD Toilet Finder</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 16px; background: #f8f9fa; color: #212529; }
        .log-panel { background: #e9ecef; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 0.8rem; margin-bottom: 16px; white-space: pre-wrap; max-height: 150px; overflow-y: auto; border: 1px solid #dee2e6; }
        .card { background: white; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #dee2e6; border-left: 4px solid #0d6efd; }
        .name { font-weight: bold; font-size: 0.95rem; }
        .addr { color: #6c757d; font-size: 0.85rem; margin-top: 4px; }
        .meta { font-size: 0.75rem; margin-top: 4px; color: #198754; font-weight: 600; }
        input { padding: 8px; width: 300px; margin-right: 8px; }
        button { padding: 8px 16px; }
    </style>
</head>
<body>
    <h2>食環署公廁搜尋測試</h2>
    <div>
        <input id="placeInput" value="Central, Hong Kong" placeholder="輸入地點例如 Central">
        <button onclick="searchPlace()">搜尋</button>
    </div>
    <div id="log" class="log-panel">準備就緒。點擊搜尋開始。</div>
    <div id="test-results"></div>
    <script>
        const logDiv = document.getElementById('log');
        const resultsDiv = document.getElementById('test-results');
        function logger(text) {
            logDiv.textContent += "\n" + text;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
        async function searchPlace() {
            const place = document.getElementById('placeInput').value || "Central, Hong Kong";
            const userLat = 22.282;
            const userLon = 114.158;
            logger("使用地點: " + place + " (測試座標: " + userLat + ", " + userLon + ")");
            const targetUrl = 'https://www.fehd.gov.hk/tc_chi/map/fehd_map_c.xml';
            const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl);
            logger("開始請求數據...");
            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) {
                    logger("錯誤: 狀態碼 " + response.status);
                    return;
                }
                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const maps = xmlDoc.getElementsByTagName('map');
                let toilets = [];
                for (let i = 0; i < maps.length; i++) {
                    const node = maps[i];
                    const mapType = node.getElementsByTagName('map_type')[0]?.textContent || '';
                    const name = node.getElementsByTagName('name_c')[0]?.textContent || '';
                    const address = node.getElementsByTagName('address_c')[0]?.textContent || '';
                    const coordStr = node.getElementsByTagName('map_coordinate')[0]?.textContent || '';
                    if ((mapType === 'toilet' || name.includes('公廁')) && coordStr) {
                        const [tLat, tLon] = coordStr.split(',').map(Number);
                        const dist = getDistance(userLat, userLon, tLat, tLon);
                        toilets.push({name, address, coord: coordStr, distance: dist});
                    }
                }
                toilets.sort((a, b) => a.distance - b.distance);
                const top = toilets.slice(0, 10);
                logger("找到公廁: " + toilets.length + "，顯示最近10個");
                let html = "";
                top.forEach(t => {
                    html += `
                        <div class="card">
                            <div class="name">${t.name}</div>
                            <div class="addr">地址: ${t.address}</div>
                            <div class="meta">距離: ${t.distance.toFixed(2)} km | 座標: ${t.coord}</div>
                        </div>
                    `;
                });
                resultsDiv.innerHTML = html;
            } catch (error) {
                logger("錯誤: " + error.message);
            }
        }
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('placeInput').value = "Central, Hong Kong";
                searchPlace();
            }, 300);
        });
    </script>
</body>
</html>
